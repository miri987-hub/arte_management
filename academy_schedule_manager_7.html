<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학원 스케줄 매니저</title>
<style>
  :root{
    --bg: #F6F5F2;
    --panel: #FFFFFF;
    --ink: #22262B;
    --ink-soft: #6B7280;
    --line: #E5E3DD;
    --navy: #26344B;
    --navy-soft: #3E4F6B;
    --accent: #C77B4A;
    --blue: #3B6FA6;
    --green: #4C8A63;
    --amber: #C08A2E;
    --red: #B94A3D;
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size:14px;
  }
  .app{ max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
  header.top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 18px; flex-wrap: wrap; gap:10px;
  }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{
    font-weight:800; font-size:20px; letter-spacing:-0.02em; color: var(--navy);
  }
  .brand .sub{ font-size:12px; color: var(--ink-soft); }
  .role-select{
    display:flex; align-items:center; gap:8px; background:var(--panel);
    border:1px solid var(--line); border-radius: 999px; padding: 6px 6px 6px 14px;
  }
  .role-select label{ font-size:12px; color:var(--ink-soft); }
  select, input, button{
    font-family: inherit; font-size: 13px;
  }
  select{
    border:none; background:transparent; font-weight:700; color:var(--navy);
    padding: 4px 8px; border-radius: 999px; cursor:pointer;
  }
  nav.tabs{
    display:flex; gap:4px; background:var(--panel); padding:4px; border-radius: 12px;
    border:1px solid var(--line); margin-bottom:18px; width:fit-content;
  }
  nav.tabs button{
    border:none; background:transparent; padding: 9px 18px; border-radius:9px;
    cursor:pointer; font-weight:600; color:var(--ink-soft);
  }
  nav.tabs button.active{ background: var(--navy); color:#fff; }

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius: var(--radius);
    padding: 18px; margin-bottom:16px;
  }
  .panel h3{ margin:0 0 12px; font-size:15px; color:var(--navy); }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }
  .field{ display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
  .field label{ font-size:12px; color:var(--ink-soft); font-weight:600; }
  .field input, .field select{
    border:1px solid var(--line); border-radius:8px; padding:8px 10px; background:#FCFCFB;
    font-weight:500; color:var(--ink); min-width: 140px;
  }
  .field.grow{ flex:1; min-width:200px; }
  .btn{
    border:none; border-radius:8px; padding:9px 16px; font-weight:700; cursor:pointer;
    background: var(--navy); color:#fff;
  }
  .btn.secondary{ background:#EFEDE7; color:var(--navy); }
  .btn.warn{ background: var(--amber); color:#fff; }
  .btn.danger{ background: var(--red); color:#fff; }
  .btn.small{ padding:5px 10px; font-size:12px; border-radius:6px; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  table{ width:100%; border-collapse: collapse; }
  th, td{ text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  th{ color:var(--ink-soft); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  tr:hover td{ background: #FAFAF8; }

  .badge{
    display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700;
  }
  .badge.scheduled{ background:#E9F0F9; color:var(--blue); }
  .badge.completed{ background:#E9F3EC; color:var(--green); }
  .badge.delayed{ background:#FBF0DD; color:var(--amber); }
  .badge.noshow{ background:#FBEAE7; color:var(--red); }
  .badge.moved{ background:#F1EFEA; color:var(--ink-soft); }

  .day-group{ margin-bottom: 14px; }
  .day-title{
    font-weight:800; color:var(--navy); font-size:13px; margin: 18px 0 6px;
    padding-bottom:6px; border-bottom: 2px solid var(--navy);
  }
  .empty{ color:var(--ink-soft); font-size:13px; padding: 20px 6px; text-align:center; }
  .progress-wrap{ display:flex; align-items:center; gap:8px; }
  .progress-bar{ width:70px; height:6px; background:#EEECE6; border-radius:99px; overflow:hidden; }
  .progress-bar > div{ height:100%; background: var(--accent); }
  .warning-box{
    background:#FBEAE7; border:1px solid #EAC4BC; color:var(--red);
    padding:10px 12px; border-radius:8px; font-size:12.5px; margin-bottom:10px; display:none;
  }
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background: var(--navy); color:#fff; padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:600; box-shadow:0 8px 24px rgba(0,0,0,.18);
    opacity:0; pointer-events:none; transition: opacity .2s, transform .2s; z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(20,20,20,.4); display:none;
    align-items:center; justify-content:center; z-index:40; padding:16px;
  }
  .modal-backdrop.show{ display:flex; }
  .modal{
    background:#fff; border-radius:12px; padding:20px; width:100%; max-width:420px;
    max-height:88vh; overflow:auto;
  }
  .modal h4{ margin:0 0 12px; color:var(--navy); }
  .muted{ color:var(--ink-soft); font-size:12px; }
  .divider{ height:1px; background:var(--line); margin:14px 0; }
  .actions-cell{ display:flex; gap:4px; flex-wrap:wrap; }
  .note{ font-size:12px; color:var(--ink-soft); margin-top:10px; line-height:1.6; }
  .loading{ text-align:center; padding:40px; color:var(--ink-soft); }
  table.timetable td{ padding:4px; vertical-align:top; }
  table.timetable th{ text-align:center; }
  .tt-cell{
    border-radius:8px; padding:6px 8px; font-size:12px; font-weight:600; cursor:pointer;
    background:#E9F0F9; color:var(--blue); line-height:1.4; min-height:36px;
  }
  .tt-cell.completed{ background:#E9F3EC; color:var(--green); }
  .tt-cell.noshow{ background:#FBEAE7; color:var(--red); text-decoration: line-through; }
  .tt-cell:hover{ filter: brightness(0.96); }
  .week-nav{ display:flex; gap:6px; align-items:center; }
  .cal-grid{
    display:grid; grid-template-columns: repeat(7, 1fr); gap:6px; margin-top:6px;
  }
  .cal-head{ margin-top:0; margin-bottom:2px; }
  .cal-daylabel{ text-align:center; font-size:11px; font-weight:700; color:var(--ink-soft); padding:2px 0; }
  .cal-cell{
    border:1px solid var(--line); border-radius:8px; min-height:96px; padding:6px;
    background:#FCFCFB; display:flex; flex-direction:column; gap:4px;
  }
  .cal-cell.empty-cell{ background:transparent; border:none; }
  .cal-cell.today{ border-color: var(--navy); background:#F1F4F9; }
  .cal-daynum{ font-size:12px; font-weight:700; color:var(--ink-soft); }
  #ttTeacherSelect{
    border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-weight:700; color:var(--navy); background:#fff;
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loadingMsg">불러오는 중...</div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modalBody"></div></div>

<script>
const STORAGE_KEY = 'academy-data-v1';
let data = null; // { teachers:[], students:[], sessions:[] }
let currentTab = 'schedule';
let currentRole = 'admin'; // 'admin' or teacherId
let currentWeekStart = null; // set after helpers defined

const uid = () => Math.random().toString(36).slice(2, 10);

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._h);
  toast._h = setTimeout(()=> t.classList.remove('show'), 2200);
}

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    data = res && res.value ? JSON.parse(res.value) : { teachers: [], students: [], sessions: [] };
  }catch(e){
    data = { teachers: [], students: [], sessions: [] };
  }
  render();
}

async function saveData(){
  try{
    const ok = await window.storage.set(STORAGE_KEY, JSON.stringify(data), true);
    if(!ok) toast('저장 실패 - 다시 시도해주세요');
  }catch(e){
    toast('저장 오류: ' + e.message);
  }
}

// All date math below intentionally avoids new Date(str).toISOString() round-trips,
// because that path silently shifts dates by one day for any timezone ahead of UTC
// (e.g. Korea, UTC+9) — that was the root cause of "7/18 saved as 7/17".
// Instead we parse Y/M/D ourselves and always read/write using UTC accessors.
function parseYMD(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  return {y,m,d};
}
function toYMD(dt){
  const y = dt.getUTCFullYear();
  const m = String(dt.getUTCMonth()+1).padStart(2,'0');
  const d = String(dt.getUTCDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function fmtDate(d){
  const p = parseYMD(d);
  const dow = new Date(Date.UTC(p.y, p.m-1, p.d)).getUTCDay();
  const days = ['일','월','화','수','목','금','토'];
  return `${p.m}월 ${p.d}일 (${days[dow]})`;
}
function addDays(dateStr, n){
  const {y,m,d} = parseYMD(dateStr);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate()+n);
  return toYMD(dt);
}
function todayStr(){
  // Local calendar date (not UTC) — this is "today" as the person sees it on their clock.
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function startOfWeek(dateStr){
  const {y,m,d} = parseYMD(dateStr);
  const dt = new Date(Date.UTC(y, m-1, d));
  const day = dt.getUTCDay();
  const diff = (day === 0 ? -6 : 1 - day);
  dt.setUTCDate(dt.getUTCDate()+diff);
  return toYMD(dt);
}
function fmtDateShort(d){
  const p = parseYMD(d);
  const dow = new Date(Date.UTC(p.y, p.m-1, p.d)).getUTCDay();
  const days = ['일','월','화','수','목','금','토'];
  return `${p.m}/${p.d} (${days[dow]})`;
}
function addMonths(yyyymm, n){
  let [y,m] = yyyymm.split('-').map(Number);
  m += n;
  while(m>12){ m-=12; y+=1; }
  while(m<1){ m+=12; y-=1; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
function daysInMonth(y,m){ // m is 1-based
  return new Date(Date.UTC(y, m, 0)).getUTCDate();
}
function firstWeekdayOfMonth(y,m){ // m is 1-based; returns 0(sun)..6(sat)
  return new Date(Date.UTC(y, m-1, 1)).getUTCDay();
}
currentWeekStart = startOfWeek(todayStr());
let currentMonth = todayStr().slice(0,7); // 'YYYY-MM'
let timetableTeacherId = null;
let scheduleSearchQuery = '';
let scheduleTeacherFilter = 'all';

function teacherName(id){
  const t = data.teachers.find(x=>x.id===id);
  return t ? t.name : '(미배정)';
}
function studentName(id){
  const s = data.students.find(x=>x.id===id);
  return s ? s.name : '(삭제된 학생)';
}
function weekdayOf(dateStr){
  const p = parseYMD(dateStr);
  return new Date(Date.UTC(p.y, p.m-1, p.d)).getUTCDay();
}
function studentScheduleSummary(studentId){
  const sessions = data.sessions.filter(s=>s.studentId===studentId);
  if(sessions.length===0) return '-';
  const dayNames = ['일','월','화','수','목','금','토'];
  const uniqueTimes = new Set(sessions.map(s=>s.time));
  const uniqueWeekdays = new Set(sessions.map(s=>weekdayOf(s.date)));
  if(uniqueTimes.size===1 && uniqueWeekdays.size===1){
    const wd = [...uniqueWeekdays][0];
    const t = [...uniqueTimes][0];
    return `매주 ${dayNames[wd]} ${t}`;
  }
  const sorted = sessions.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const parts = sorted.map(s=>`${fmtDateShort(s.date)} ${s.time}`);
  if(parts.length > 4){
    return parts.slice(0,4).join(', ') + ` 외 ${parts.length-4}건`;
  }
  return parts.join(', ');
}

// ---- conflict check ----
function findConflict(teacherId, date, time, excludeSessionId){
  return data.sessions.find(s =>
    s.id !== excludeSessionId &&
    s.teacherId === teacherId &&
    s.date === date &&
    s.time === time &&
    s.status !== 'delayed_moved' // moved-away sessions don't block
  );
}

// Recomputes a student's round numbers (1/N, 2/N ...) based on chronological
// date+time order. Call this any time a student's sessions change date/time,
// or a session is added/removed, so "n/N" always matches the actual schedule order.
function renumberStudentRounds(studentId){
  const student = data.students.find(s=>s.id===studentId);
  const totalRounds = student ? student.totalSessions : null;
  const sessions = data.sessions
    .filter(s=>s.studentId===studentId)
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
  sessions.forEach((s, idx)=>{
    s.round = idx+1;
    if(totalRounds) s.totalRounds = totalRounds;
  });
}

// ---- rendering ----
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="top">
      <div class="brand">
        <span class="mark">SpeechFlow</span>
        <span class="sub">학원 스케줄 매니저</span>
      </div>
      <div class="role-select">
        <label>보기 권한</label>
        ${renderRoleSelect()}
      </div>
    </header>
    <nav class="tabs">
      <button data-tab="schedule" class="${currentTab==='schedule'?'active':''}">스케줄</button>
      <button data-tab="timetable" class="${currentTab==='timetable'?'active':''}">시간표</button>
      <button data-tab="students" class="${currentTab==='students'?'active':''}">학생 관리</button>
      <button data-tab="teachers" class="${currentTab==='teachers'?'active':''}">강사 관리</button>
    </nav>
    <div id="tabContent"></div>
  `;
  app.querySelectorAll('nav.tabs button').forEach(b=>{
    b.onclick = ()=>{ currentTab = b.dataset.tab; render(); };
  });
  const roleSel = app.querySelector('#roleSelect');
  if(roleSel){
    roleSel.onchange = (e)=>{ currentRole = e.target.value; render(); };
  }
  const content = document.getElementById('tabContent');
  if(currentTab==='schedule') content.innerHTML = '', renderSchedule(content);
  if(currentTab==='timetable') content.innerHTML = '', renderTimetable(content);
  if(currentTab==='students') content.innerHTML = '', renderStudents(content);
  if(currentTab==='teachers') content.innerHTML = '', renderTeachers(content);
}

function renderRoleSelect(){
  let opts = `<option value="admin" ${currentRole==='admin'?'selected':''}>관리자 (전체 보기)</option>`;
  data.teachers.forEach(t=>{
    opts += `<option value="${t.id}" ${currentRole===t.id?'selected':''}>${t.name} 강사 (본인만)</option>`;
  });
  return `<select id="roleSelect">${opts}</select>`;
}

function visibleSessions(){
  if(currentRole==='admin') return data.sessions;
  return data.sessions.filter(s=>s.teacherId===currentRole);
}
function visibleStudents(){
  if(currentRole==='admin') return data.students;
  return data.students.filter(s=>s.teacherId===currentRole);
}

// ---------------- SCHEDULE TAB ----------------
function renderSchedule(root){
  if(currentRole !== 'admin'){
    scheduleTeacherFilter = currentRole; // teachers only ever see their own
  }

  const teacherChips = currentRole === 'admin' ? `
    <div class="row" style="margin-bottom:4px">
      <button class="btn small ${scheduleTeacherFilter==='all' ? '' : 'secondary'}" data-teacher-filter="all">전체</button>
      ${data.teachers.map(t=>`<button class="btn small ${scheduleTeacherFilter===t.id ? '' : 'secondary'}" data-teacher-filter="${t.id}">${t.name}</button>`).join('')}
    </div>
  ` : '';

  let html = `
    <div class="panel">
      <div class="row" style="justify-content:space-between; align-items:center; flex-wrap:wrap">
        <h3 style="margin:0">전체 스케줄 ${currentRole!=='admin' ? '· ' + teacherName(currentRole) + ' 강사만 보기' : ''}</h3>
        <div class="field" style="margin:0">
          <input id="scheduleSearch" placeholder="학생 이름으로 찾기" value="${scheduleSearchQuery.replace(/"/g,'&quot;')}" style="min-width:220px; border:1px solid var(--line); border-radius:8px; padding:8px 10px;">
        </div>
      </div>
      ${teacherChips}
      <div id="scheduleResults"></div>
    </div>
  `;
  root.innerHTML = html;
  const searchInput = document.getElementById('scheduleSearch');
  searchInput.oninput = (e)=>{ scheduleSearchQuery = e.target.value; updateScheduleResults(); };
  root.querySelectorAll('[data-teacher-filter]').forEach(btn=>{
    btn.onclick = ()=>{ scheduleTeacherFilter = btn.dataset.teacherFilter; render(); };
  });
  updateScheduleResults();
}

function updateScheduleResults(){
  const container = document.getElementById('scheduleResults');
  if(!container) return;
  const query = scheduleSearchQuery.trim().toLowerCase();

  const sessions = visibleSessions()
    .filter(s => s.status !== 'delayed_moved')
    .filter(s => scheduleTeacherFilter === 'all' || s.teacherId === scheduleTeacherFilter)
    .filter(s => !query || studentName(s.studentId).toLowerCase().includes(query))
    .slice()
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));

  const byDate = {};
  sessions.forEach(s=>{
    byDate[s.date] = byDate[s.date] || [];
    byDate[s.date].push(s);
  });
  const dates = Object.keys(byDate).sort();

  let html = '';
  if(dates.length===0){
    html += query
      ? `<div class="empty">"${scheduleSearchQuery}" 학생의 수업을 찾을 수 없어요.</div>`
      : `<div class="empty">등록된 수업이 없어요. 위에서 수업을 추가하거나, '학생 관리'에서 신규 학생을 등록해 회차를 한번에 생성해보세요.</div>`;
  } else {
    dates.forEach(d=>{
      html += `<div class="day-group"><div class="day-title">${fmtDate(d)}</div><table><thead><tr>
        <th>시간</th><th>학생</th><th>회차</th><th>담당강사</th><th>상태</th><th>처리</th>
      </tr></thead><tbody>`;
      byDate[d].sort((a,b)=>a.time.localeCompare(b.time)).forEach(s=>{
        html += renderSessionRow(s);
      });
      html += `</tbody></table></div>`;
    });
  }
  container.innerHTML = html;
  container.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick = ()=> handleSessionAction(btn.dataset.action, btn.dataset.id);
  });
}

// ---------------- TIMETABLE TAB ----------------
function renderTimetable(root){
  const teachers = data.teachers;
  // decide which teacher's calendar to show
  if(currentRole !== 'admin'){
    timetableTeacherId = currentRole;
  } else if(!timetableTeacherId || !teachers.find(t=>t.id===timetableTeacherId)){
    timetableTeacherId = teachers.length ? teachers[0].id : null;
  }

  const [y, m] = currentMonth.split('-').map(Number);
  const monthLabel = `${y}년 ${m}월`;

  let html = `
    <div class="panel">
      <div class="row" style="justify-content:space-between; align-items:center; flex-wrap:wrap">
        <div class="row" style="align-items:center">
          <h3 style="margin:0 10px 0 0">${monthLabel}</h3>
          ${currentRole==='admin' ? `
            <select id="ttTeacherSelect">
              ${teachers.map(t=>`<option value="${t.id}" ${t.id===timetableTeacherId?'selected':''}>${t.name} 강사</option>`).join('')}
            </select>
          ` : `<span class="muted">${teacherName(currentRole)} 강사</span>`}
        </div>
        <div class="week-nav">
          <button class="btn small secondary" id="prevMonthBtn">◀ 이전달</button>
          <button class="btn small secondary" id="thisMonthBtn">이번달</button>
          <button class="btn small secondary" id="nextMonthBtn">다음달 ▶</button>
        </div>
      </div>
    </div>
  `;

  if(teachers.length===0){
    html += `<div class="panel"><div class="empty">강사를 먼저 등록해주세요.</div></div>`;
  } else if(!timetableTeacherId){
    html += `<div class="panel"><div class="empty">강사를 선택해주세요.</div></div>`;
  } else {
    const sessions = data.sessions.filter(s=>
      s.teacherId===timetableTeacherId && s.status!=='delayed_moved' && s.date.slice(0,7)===currentMonth
    );
    const byDate = {};
    sessions.forEach(s=>{ (byDate[s.date] = byDate[s.date] || []).push(s); });
    Object.values(byDate).forEach(list=> list.sort((a,b)=>a.time.localeCompare(b.time)));

    const totalDays = daysInMonth(y, m);
    const leadBlanks = firstWeekdayOfMonth(y, m);
    const cells = [];
    for(let i=0;i<leadBlanks;i++) cells.push(null);
    for(let day=1; day<=totalDays; day++) cells.push(`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
    while(cells.length % 7 !== 0) cells.push(null);

    const dayNames = ['일','월','화','수','목','금','토'];
    html += `<div class="panel"><h3>${teacherName(timetableTeacherId)} 강사 · ${monthLabel} 시간표</h3>
      <div class="cal-grid cal-head">${dayNames.map(dn=>`<div class="cal-daylabel">${dn}</div>`).join('')}</div>
      <div class="cal-grid">`;
    cells.forEach(dateStr=>{
      if(!dateStr){ html += `<div class="cal-cell empty-cell"></div>`; return; }
      const dayNum = parseInt(dateStr.slice(8,10),10);
      const isToday = dateStr === todayStr();
      const list = byDate[dateStr] || [];
      html += `<div class="cal-cell ${isToday?'today':''}">
        <div class="cal-daynum">${dayNum}</div>
        ${list.map(s=>{
          const cls = s.status==='completed' ? 'completed' : (s.status==='noshow' ? 'noshow' : '');
          return `<div class="tt-cell ${cls}" data-session-id="${s.id}">${s.time} ${studentName(s.studentId)}<br>${s.round}/${s.totalRounds}</div>`;
        }).join('')}
      </div>`;
    });
    html += `</div></div>`;
  }

  root.innerHTML = html;
  const teacherSel = document.getElementById('ttTeacherSelect');
  if(teacherSel){ teacherSel.onchange = (e)=>{ timetableTeacherId = e.target.value; render(); }; }
  document.getElementById('prevMonthBtn').onclick = ()=>{ currentMonth = addMonths(currentMonth,-1); render(); };
  document.getElementById('thisMonthBtn').onclick = ()=>{ currentMonth = todayStr().slice(0,7); render(); };
  document.getElementById('nextMonthBtn').onclick = ()=>{ currentMonth = addMonths(currentMonth,1); render(); };
  root.querySelectorAll('.tt-cell').forEach(cell=>{
    cell.onclick = ()=> openSessionQuickView(cell.dataset.sessionId);
  });
}

function openSessionQuickView(id){
  const s = data.sessions.find(x=>x.id===id);
  if(!s) return;
  const statusLabel = {scheduled:'예정', completed:'완료', noshow:'당취'}[s.status] || s.status;
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <h4>${studentName(s.studentId)} · ${s.round}/${s.totalRounds}</h4>
    <div class="muted">${fmtDate(s.date)} ${s.time} · ${teacherName(s.teacherId)} 강사 · 상태: ${statusLabel}</div>
    <div class="divider"></div>
    <div class="actions-cell">${actionButtonsHTML(s)}</div>
    <div class="row" style="justify-content:flex-end; margin-top:14px">
      <button class="btn secondary" id="mCancel">닫기</button>
    </div>
  `;
  backdrop.classList.add('show');
  document.getElementById('mCancel').onclick = ()=> backdrop.classList.remove('show');
  body.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick = ()=>{
      backdrop.classList.remove('show');
      handleSessionAction(btn.dataset.action, btn.dataset.id);
    };
  });
}

function actionButtonsHTML(s){
  let actions = '';
  if(s.status === 'scheduled'){
    actions += `<button class="btn small secondary" data-action="complete" data-id="${s.id}">완료</button>`;
    actions += `<button class="btn small secondary" data-action="edit" data-id="${s.id}">시간변경</button>`;
    actions += `<button class="btn small danger" data-action="noshow" data-id="${s.id}">당취</button>`;
  }
  if(s.status === 'completed' || s.status === 'noshow'){
    actions += `<button class="btn small secondary" data-action="edit" data-id="${s.id}">시간변경</button>`;
    actions += `<button class="btn small secondary" data-action="revert" data-id="${s.id}">되돌리기</button>`;
  }
  actions += `<button class="btn small danger" data-action="delete" data-id="${s.id}">삭제</button>`;
  return actions;
}

function renderSessionRow(s){
  const statusMap = {
    scheduled: ['예정','scheduled'],
    completed: ['완료','completed'],
    noshow: ['당취','noshow'],
  };
  const [label, cls] = statusMap[s.status] || ['예정','scheduled'];

  return `<tr>
    <td>${s.time}</td>
    <td>${studentName(s.studentId)}</td>
    <td>${s.round}/${s.totalRounds}</td>
    <td>${teacherName(s.teacherId)}</td>
    <td><span class="badge ${cls}">${label}</span></td>
    <td class="actions-cell">${actionButtonsHTML(s)}</td>
  </tr>`;
}

function handleSessionAction(action, id){
  const session = data.sessions.find(s=>s.id===id);
  if(!session) return;

  if(action==='delete'){
    openConfirmModal('이 수업을 스케줄에서 삭제할까요?', ()=>{
      const studentId = session.studentId;
      data.sessions = data.sessions.filter(s=>s.id!==id);
      renumberStudentRounds(studentId);
      saveData(); render(); toast('삭제했어요. 남은 회차 번호도 날짜순으로 다시 정리했어요.');
    });
    return;
  }
  if(action==='complete'){
    session.status='completed'; saveData(); render(); toast('완료 처리했어요.');
    return;
  }
  if(action==='noshow'){
    session.status='noshow'; saveData(); render(); toast('당취로 표시했어요.');
    return;
  }
  if(action==='revert'){
    session.status='scheduled'; saveData(); render(); toast('예정 상태로 되돌렸어요.');
    return;
  }
  if(action==='edit'){
    openEditModal(session);
    return;
  }
}

function openConfirmModal(msg, onConfirm){
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');
  body.innerHTML = `<h4>확인</h4><p>${msg}</p>
    <div class="row" style="justify-content:flex-end">
      <button class="btn secondary" id="mCancel">취소</button>
      <button class="btn danger" id="mOk">삭제</button>
    </div>`;
  backdrop.classList.add('show');
  document.getElementById('mCancel').onclick = ()=> backdrop.classList.remove('show');
  document.getElementById('mOk').onclick = ()=>{ backdrop.classList.remove('show'); onConfirm(); };
}

function openEditModal(session){
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <h4>수업 시간 변경</h4>
    <div class="muted">${studentName(session.studentId)} · ${session.round}/${session.totalRounds}회차</div>
    <div class="divider"></div>
    <div class="field"><label>날짜</label><input type="date" id="editDate" value="${session.date}"></div>

      <button class="btn secondary" id="mCancel">취소</button>

    </div>
  `;
  backdrop.classList.add('show');

  document.getElementById('mSave').onclick = ()=>{
    const newDate = document.getElementById('editDate').value;

    const conflict = findConflict(session.teacherId, newDate, newTime, session.id);
    const warn = document.getElementById('editWarn');

      const msg = `같은 시간에 타 학생이 있습니다. (${teacherName(session.teacherId)} 강사 · ${fmtDate(newDate)} ${newTime} · ${studentName(conflict.studentId)} 학생)`;

function openStudentEditModal(studentId){
  const student = data.students.find(s=>s.id===studentId);
  if(!student) return;
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');
  const statusLabel = {scheduled:'예정', completed:'완료', noshow:'당취'};
  const sessions = data.sessions
    .filter(s=>s.studentId===studentId)
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));

  const sessionRowsHtml = sessions.length===0
    ? `<div class="muted">아직 등록된 수업이 없어요.</div>`
    : sessions.map(s=>`
        <div class="row" style="align-items:flex-end">
          <div class="field" style="min-width:70px"><label>${s.round}회차</label><span class="badge ${s.status==='completed'?'completed':s.status==='noshow'?'noshow':'scheduled'}">${statusLabel[s.status]||s.status}</span></div>
          <div class="field"><label>날짜</label><input type="date" class="editSessDate" data-session-id="${s.id}" value="${s.date}"></div>
          <div class="field"><label>시간</label><input type="time" class="editSessTime" data-session-id="${s.id}" value="${s.time}"></div>
        </div>
      `).join('');

  body.innerHTML = `
    <h4>학생 정보 수정</h4>
    <div class="field"><label>이름</label><input id="editStuName" value="${student.name}"></div>
    <div class="field"><label>담당 강사</label><select id="editStuTeacher">${teacherOptions(student.teacherId)}</select></div>
    <div class="field"><label>총 등록 횟수</label><input id="editStuTotal" type="number" min="1" value="${student.totalSessions}"></div>
    <div class="muted">총 등록 횟수를 바꾸면, 이미 잡혀있는 이 학생의 수업들에도 "n/총횟수" 표시가 새 총횟수로 업데이트돼요. 새로운 회차가 자동으로 추가되진 않으니, 필요하면 스케줄 탭에서 개별로 추가해주세요.</div>
    <div class="divider"></div>
    <h4 style="margin-bottom:4px">등록한 수업시간</h4>
    <div class="muted" style="margin-bottom:8px">아래에서 날짜·시간을 직접 고칠 수 있어요. 저장하면 회차 번호도 날짜순으로 자동 정리돼요.</div>
    <div id="editSessionRows">${sessionRowsHtml}</div>
    <div id="editStuWarn" class="warning-box"></div>
    <div class="row" style="justify-content:flex-end; margin-top:10px">
      <button class="btn secondary" id="mCancel">취소</button>
      <button class="btn" id="mSave">저장</button>
    </div>
  `;
  backdrop.classList.add('show');
  document.getElementById('mCancel').onclick = ()=> backdrop.classList.remove('show');
  document.getElementById('mSave').onclick = ()=>{
    const name = document.getElementById('editStuName').value.trim();
    const teacherId = document.getElementById('editStuTeacher').value;
    const total = parseInt(document.getElementById('editStuTotal').value,10);
    const warn = document.getElementById('editStuWarn');
    warn.style.display='none';
    if(!name){ warn.textContent='이름을 입력해주세요.'; warn.style.display='block'; return; }
    if(!teacherId){ warn.textContent='담당 강사를 선택해주세요.'; warn.style.display='block'; return; }
    if(!total || total<1){ warn.textContent='총 등록 횟수를 확인해주세요.'; warn.style.display='block'; return; }

    // gather the (possibly edited) date/time for each session
    const dateInputs = Array.from(document.querySelectorAll('.editSessDate'));
    const timeInputs = Array.from(document.querySelectorAll('.editSessTime'));
    const edits = dateInputs.map(input=>{
      const sessionId = input.dataset.sessionId;
      const timeInput = timeInputs.find(t=>t.dataset.sessionId===sessionId);
      return { sessionId, date: input.value, time: timeInput ? timeInput.value : '' };
    });

    for(const e of edits){
      if(!e.date || !e.time){
        warn.textContent = '모든 회차의 날짜·시간을 입력해주세요.';
        warn.style.display = 'block';
        return;
      }
    }

    // check conflicts: against other students' sessions, AND against each other (same student can't double-book itself)
    const conflictMsgs = [];
    for(let i=0;i<edits.length;i++){
      const e = edits[i];
      const otherStudentConflict = findConflict(teacherId, e.date, e.time, e.sessionId);
      if(otherStudentConflict && otherStudentConflict.studentId !== studentId){
        conflictMsgs.push(`${e.date} ${e.time} (${studentName(otherStudentConflict.studentId)} 학생과 겹침)`);
        continue;
      }
      const selfDuplicate = edits.find((other, j)=> j!==i && other.date===e.date && other.time===e.time);
      if(selfDuplicate){
        conflictMsgs.push(`${e.date} ${e.time} (이 학생의 다른 회차와 시간이 겹침)`);
      }
    }
    if(conflictMsgs.length>0){
      const msg = `같은 시간에 타 학생이 있습니다. 저장되지 않았어요: ${[...new Set(conflictMsgs)].join(', ')}`;
      warn.textContent = msg;
      warn.style.display = 'block';
      alert(msg);
      return;
    }

    student.name = name;
    student.teacherId = teacherId;
    student.totalSessions = total;
    edits.forEach(e=>{
      const session = data.sessions.find(s=>s.id===e.sessionId);
      if(session){ session.date = e.date; session.time = e.time; }
    });
    data.sessions.forEach(s=>{
      if(s.studentId === student.id){
        s.teacherId = teacherId;
        s.totalRounds = total;
      }
    });
    renumberStudentRounds(student.id);
    saveData();
    backdrop.classList.remove('show');
    render();
    toast('학생 정보를 수정했어요.');
  };
}

function teacherOptions(selectedId){
  if(data.teachers.length===0) return `<option value="">강사를 먼저 등록해주세요</option>`;
  return data.teachers.map(t=>`<option value="${t.id}" ${t.id===selectedId?'selected':''}>${t.name}</option>`).join('');
}

function readCommonRegFields(){
  const name = document.getElementById('regName').value.trim();
  const teacherId = document.getElementById('regTeacher').value;
  const total = parseInt(document.getElementById('regTotal').value,10);
  return { name, teacherId, total };
}

function validateCommonRegFields(f, warnBox){
  warnBox.style.display='none';
  if(!f.name){ warnBox.textContent='이름을 입력해주세요.'; warnBox.style.display='block'; return false; }
  if(!f.teacherId){ warnBox.textContent='담당 강사를 선택해주세요.'; warnBox.style.display='block'; return false; }
  if(!f.total || f.total<1){ warnBox.textContent='총 등록 횟수를 확인해주세요.'; warnBox.style.display='block'; return false; }
  return true;
}

function onRegisterStudent(){
  const f = readCommonRegFields();
  const start = document.getElementById('regStart').value;
  const weekday = parseInt(document.getElementById('regWeekday').value,10);
  const time = document.getElementById('regTime').value;
  const warnBox = document.getElementById('regWarning');
  if(!validateCommonRegFields(f, warnBox)) return;

  const { name, teacherId, total } = f;

  // find first date matching weekday on/after start
  const startP = parseYMD(start);
  const startWeekday = new Date(Date.UTC(startP.y, startP.m-1, startP.d)).getUTCDay();
  const diff = (weekday - startWeekday + 7) % 7;
  const firstDate = addDays(start, diff);

  // compute the exact intended dates first (round 1..total, every 7 days) —
  // no silent skip-forward to another date. If any of them conflicts, block entirely.
  const intendedDates = [];
  for(let i=0;i<total;i++){ intendedDates.push(addDays(firstDate, i*7)); }

  const conflicts = [];
  intendedDates.forEach((d, idx)=>{
    const conflict = findConflict(teacherId, d, time, null);
    if(conflict){
      conflicts.push(`${idx+1}회차 (${fmtDate(d)} ${time}, ${studentName(conflict.studentId)} 학생과 겹침)`);
    }
  });

  if(conflicts.length>0){
    const msg = `같은 시간에 타 학생이 있습니다. 등록되지 않았어요: ${conflicts.join(', ')}. 시작일/요일/시간을 바꾸거나, '회차마다 직접 입력'으로 등록해주세요.`;
    warnBox.textContent = msg;
    warnBox.style.display = 'block';
    alert(msg);
    return;
  }

  const student = { id: uid(), name, teacherId, totalSessions: total };
  const newSessions = intendedDates.map((d, idx)=>({
    id: uid(), studentId: student.id, teacherId, date: d, time,
    round: idx+1, totalRounds: total, status: 'scheduled'
  }));

  data.students.push(student);
  data.sessions.push(...newSessions);
  saveData();
  render();
  toast(`${name} 학생 등록 완료! 회차 ${total}개가 자동으로 생성됐어요.`);
}

function onRegisterStudentManual(){
  const f = readCommonRegFields();
  const warnBox = document.getElementById('regWarning');
  if(!validateCommonRegFields(f, warnBox)) return;

  const { name, teacherId, total } = f;
  const dateInputs = Array.from(document.querySelectorAll('.manualDate'));
  const timeInputs = Array.from(document.querySelectorAll('.manualTime'));

  if(dateInputs.length !== total || timeInputs.length !== total){
    warnBox.textContent = `'총 등록 횟수만큼 입력칸 만들기'를 먼저 눌러 ${total}개 회차의 날짜·시간을 입력해주세요.`;
    warnBox.style.display = 'block';
    return;
  }

  const student = { id: uid(), name, teacherId, totalSessions: total };

  const newSessions = [];
  const conflicts = [];
  for(let i=0;i<total;i++){
    const round = parseInt(dateInputs[i].dataset.round,10);
    const date = dateInputs[i].value;
    const time = timeInputs[i].value;
    if(!date || !time){
      warnBox.textContent = `${round}회차의 날짜·시간을 모두 입력해주세요.`;
      warnBox.style.display = 'block';
      return;
    }
    const conflict = findConflict(teacherId, date, time, null) || newSessions.find(s=>s.date===date && s.time===time);
    if(conflict){
      conflicts.push(`${round}회차 (${fmtDate(date)} ${time}, ${studentName(conflict.studentId)} 학생과 겹침)`);
    } else {
      newSessions.push({ id: uid(), studentId: student.id, teacherId, date, time, round, totalRounds: total, status: 'scheduled' });
    }
  }

  if(conflicts.length>0){
    const msg = `같은 시간에 타 학생이 있습니다. 등록되지 않았어요: ${conflicts.join(', ')}. 날짜/시간을 수정한 후 다시 시도해주세요.`;
    warnBox.textContent = msg;
    warnBox.style.display = 'block';
    alert(msg);
    return;
  }

  data.students.push(student);
  data.sessions.push(...newSessions);
  saveData();
  render();
  toast(`${name} 학생 등록 완료! 입력하신 ${total}개 회차가 각각의 날짜로 생성됐어요.`);
}

// ---------------- TEACHERS TAB ----------------
function renderTeachers(root){
  let html = `
    <div class="panel">
      <h3>강사 등록</h3>
      <div class="row">
        <div class="field grow"><label>강사 이름</label><input id="teacherName" placeholder="예: 김민지"></div>
        <div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn" id="addTeacherBtn">추가</button></div>
      </div>
    </div>
    <div class="panel">
      <h3>강사 목록</h3>
  `;
  if(data.teachers.length===0){
    html += `<div class="empty">등록된 강사가 없어요.</div>`;
  } else {
    html += `<table><thead><tr><th>이름</th><th>담당 학생 수</th><th>관리</th></tr></thead><tbody>`;
    data.teachers.forEach(t=>{
      const cnt = data.students.filter(s=>s.teacherId===t.id).length;
      html += `<tr><td><b>${t.name}</b></td><td>${cnt}명</td>
        <td><button class="btn small danger" data-del-teacher="${t.id}">삭제</button></td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `<div class="note">강사 삭제는 담당 학생이 없을 때만 가능해요. 이 화면의 '보기 권한'에 강사가 자동으로 추가돼서, 각 강사는 본인 이름을 선택하면 본인 학생과 스케줄만 볼 수 있어요.</div></div>`;
  root.innerHTML = html;
  document.getElementById('addTeacherBtn').onclick = ()=>{
    const val = document.getElementById('teacherName').value.trim();
    if(!val) return;
    data.teachers.push({ id: uid(), name: val });
    saveData(); render(); toast('강사를 추가했어요.');
  };
  root.querySelectorAll('[data-del-teacher]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.delTeacher;
      const cnt = data.students.filter(s=>s.teacherId===id).length;
      if(cnt>0){ toast('담당 학생이 있는 강사는 삭제할 수 없어요.'); return; }
      data.teachers = data.teachers.filter(t=>t.id!==id);
      if(currentRole===id) currentRole='admin';
      saveData(); render(); toast('강사를 삭제했어요.');
    };
  });
}
