<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학원 스케줄 매니저</title>
<style>

    --bg: #F6F5F2;
    --panel: #FFFFFF;
    --ink: #22262B;
    --ink-soft: #6B7280;
    --line: #E5E3DD;

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://cpxlmgmcmsjznwjxfhgc.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nrqFXM7Da0_-6zyRP4X8Hw_zbWaCJwL';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STORAGE_KEY = 'academy-data-v1';
let data = null; // { teachers:[], students:[], sessions:[] }
let currentTab = 'schedule';
let currentRole = 'admin'; // 'admin' or teacherId
let currentWeekStart = null; // set after helpers defined

const uid = () => Math.random().toString(36).slice(2, 10);

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._h);
  toast._h = setTimeout(()=> t.classList.remove('show'), 2200);
}

// updated_at of the row we last loaded/saved successfully. Used to detect
// whether someone else has saved in between — see saveData() below. This is
// the core piece that prevents one person's save from silently wiping out
// another person's change when 2-3 people use the admin page at once.
let lastLoadedAt = null;

// Pulls the latest saved value (+ its updated_at) from Supabase into memory.
// Deliberately does NOT touch role/URL/PIN handling — that only belongs in the
// very first page load (see loadData()), not in silent background refreshes
// or post-conflict reloads, otherwise a background sync could unexpectedly
// pop a PIN prompt while someone is mid-edit.
async function fetchLatestData(){
  try{
    const { data: row, error } = await supabaseClient
      .from('app_data')
      .select('value, updated_at')
      .eq('id', STORAGE_KEY)
      .maybeSingle();
    if(error) throw error;
    // Keep whatever we already had in memory if the row doesn't exist yet,
    // rather than blowing away in-progress local state with an empty scaffold.
    data = (row && row.value) ? row.value : (data || { teachers: [], students: [], sessions: [], blocks: [] });
    if(!data.blocks) data.blocks = []; // backward compatibility for data saved before this feature
    lastLoadedAt = row ? row.updated_at : null;
    return true;
  }catch(e){
    console.error('fetchLatestData error', e);
    toast('데이터를 불러오지 못했어요. 인터넷 연결을 확인해주세요.');
    return false;
  }
}

async function loadData(){
  await fetchLatestData();

  // Personal teacher links: opening "...?teacher=<teacherId>" auto-selects that
  // teacher's view (still asks for their PIN first if one is set).
  const linkTeacherId = new URLSearchParams(location.search).get('teacher');
  if(linkTeacherId && data.teachers.find(t=>t.id===linkTeacherId)){
    attemptRoleSwitch(linkTeacherId, ()=>{}, ()=>{ render(); });
  } else {
    render();
  }
}

// Saves the current in-memory `data` to Supabase.
//
// CONCURRENT-EDITOR SAFETY: 2-3 people can have this page open at once, each
// holding their own in-memory copy of `data`. A plain "always overwrite"
// save would silently erase whatever anyone else saved in between — that's
// the "내가 적었는데 다른 사람이 보면 없다" bug. To prevent that, this uses
// optimistic concurrency (compare-and-swap): we only write if the row's
// updated_at in the database still matches what we last loaded. If someone
// else saved in between, our write matches zero rows, we detect that, pull
// in their real latest version instead of clobbering it, and clearly tell
// the person to redo whatever they just did — so data loss is never silent.
async function saveData(){
  const newTimestamp = new Date().toISOString();
  try{
    if(!lastLoadedAt){
      // No row existed yet when we last loaded (very first save ever) —
      // a plain upsert is safe here since there's nothing to collide with.
      const { error } = await supabaseClient
        .from('app_data')
        .upsert({ id: STORAGE_KEY, value: data, updated_at: newTimestamp });
      if(error) throw error;
      lastLoadedAt = newTimestamp;
      return;
    }

    const { data: updatedRows, error } = await supabaseClient
      .from('app_data')
      .update({ value: data, updated_at: newTimestamp })
      .eq('id', STORAGE_KEY)
      .eq('updated_at', lastLoadedAt)
      .select('updated_at');
    if(error) throw error;

    if(!updatedRows || updatedRows.length === 0){
      // Someone else saved between our last load and now, so our condition
      // didn't match and nothing was overwritten. Pull in their version and
      // make it unmistakable that the just-attempted action needs redoing.
      await fetchLatestData();
      render();
      toast('⚠️ 다른 분이 방금 저장해서 최신 내용으로 새로고침했어요. 방금 하신 작업을 다시 한 번 해주세요.');
      return;
    }
    lastLoadedAt = updatedRows[0].updated_at;
  }catch(e){
    console.error('saveData error', e);
    toast('저장 실패: 인터넷 연결을 확인하고 다시 시도해주세요.');
  }
}

// Lightweight background check (only fetches the timestamp, not the whole
// dataset) for whether someone else has saved since we last loaded. If so,
// and no modal is currently open (so we never yank data out from under
// someone mid-edit), silently refresh to the latest version. This shrinks
// the window where two people are editing stale copies at once, so actual
// save conflicts become rare.
setInterval(async ()=>{
  if(!lastLoadedAt) return;
  const backdrop = document.getElementById('modalBackdrop');
  if(backdrop && backdrop.classList.contains('show')) return; // don't interrupt an open modal
  try{
    const { data: row, error } = await supabaseClient
      .from('app_data')
      .select('updated_at')
      .eq('id', STORAGE_KEY)
      .maybeSingle();
    if(error || !row) return;
    if(row.updated_at !== lastLoadedAt){
      await fetchLatestData();
      render();
      toast('다른 분이 저장한 최신 내용으로 자동 새로고침했어요.');
    }
  }catch(e){
    console.error('background sync check failed', e);
  }
}, 15000);

// All date math below intentionally avoids new Date(str).toISOString() round-trips,
// because that path silently shifts dates by one day for any timezone ahead of UTC
// (e.g. Korea, UTC+9) — that was the root cause of "7/18 saved as 7/17".
// Instead we parse Y/M/D ourselves and always read/write using UTC accessors.
function parseYMD(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  return {y,m,d};
}
function toYMD(dt){
  const y = dt.getUTCFullYear();
  const m = String(dt.getUTCMonth()+1).padStart(2,'0');
  const d = String(dt.getUTCDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function fmtDate(d){
  const p = parseYMD(d);
  const dow = new Date(Date.UTC(p.y, p.m-1, p.d)).getUTCDay();
  const days = ['일','월','화','수','목','금','토'];
  return `${p.m}월 ${p.d}일 (${days[dow]})`;
}
function addDays(dateStr, n){
  const {y,m,d} = parseYMD(dateStr);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate()+n);
  return toYMD(dt);
}
function todayStr(){
  // Local calendar date (not UTC) — this is "today" as the person sees it on their clock.
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function startOfWeek(dateStr){
  const {y,m,d} = parseYMD(dateStr);
  const dt = new Date(Date.UTC(y, m-1, d));
  const day = dt.getUTCDay();
  const diff = (day === 0 ? -6 : 1 - day);
  dt.setUTCDate(dt.getUTCDate()+diff);
  return toYMD(dt);
}
function fmtDateShort(d){
  const p = parseYMD(d);
  const dow = new Date(Date.UTC(p.y, p.m-1, p.d)).getUTCDay();
  const days = ['일','월','화','수','목','금','토'];
  return `${p.m}/${p.d} (${days[dow]})`;
}
function addMonths(yyyymm, n){
  let [y,m] = yyyymm.split('-').map(Number);
  m += n;
  while(m>12){ m-=12; y+=1; }
  while(m<1){ m+=12; y-=1; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
function daysInMonth(y,m){ // m is 1-based
  return new Date(Date.UTC(y, m, 0)).getUTCDate();
}
function firstWeekdayOfMonth(y,m){ // m is 1-based; returns 0(sun)..6(sat)
  return new Date(Date.UTC(y, m-1, 1)).getUTCDay();
}

// NOTE: covers 2026 (and Jan 1 2027) since that's the period this app is used in.
// Lunar-based holidays (설날, 추석, 부처님오신날) shift every year, so this table
// will need new dates added for 2027 onward once they're confirmed.
const HOLIDAYS_2026 = {

  '2026-02-16': '설날 연휴',
  '2026-02-17': '설날',
  '2026-02-18': '설날 연휴',
  '2026-03-01': '삼일절',
  '2026-03-02': '대체공휴일(삼일절)',
  '2026-05-05': '어린이날',
  '2026-05-24': '부처님오신날',
  '2026-05-25': '대체공휴일(부처님오신날)',
  '2026-06-03': '전국동시지방선거',
  '2026-06-06': '현충일',
  '2026-07-17': '제헌절',
  '2026-08-15': '광복절',
  '2026-08-17': '대체공휴일(광복절)',
  '2026-09-24': '추석 연휴',
  '2026-09-25': '추석',
  '2026-09-26': '추석 연휴',
  '2026-10-03': '개천절',
  '2026-10-05': '대체공휴일(개천절)',
  '2026-10-09': '한글날',
  '2026-12-25': '크리스마스',
  '2027-01-01': '신정',
};
function holidayLabel(dateStr){
  return HOLIDAYS_2026[dateStr] || null;
}

currentWeekStart = startOfWeek(todayStr());
let currentMonth = todayStr().slice(0,7); // 'YYYY-MM'
let timetableTeacherId = null;
let scheduleSearchQuery = '';
let studentSearchQuery = '';
let scheduleTeacherFilter = 'all';
let scheduleMonthFilter = todayStr().slice(0,7);

const SUBJECT_CATEGORIES = [
  { name: '스피치 항목', items: [
    { id:'voice', label:'보이스', abbr:'보' },
    { id:'care', label:'케어', abbr:'케' },
    { id:'smart', label:'스마트', abbr:'스' },
    { id:'pt', label:'PT', abbr:'피' },
    { id:'business', label:'비즈니스', abbr:'비' },
    { id:'communication', label:'소통', abbr:'소' },
    { id:'group', label:'그룹', abbr:'그룹' },
    { id:'stewardess', label:'승무원보이스', abbr:'승보' },
    { id:'middle_school_speech', label:'중등스피치', abbr:'중스' },
  ]},
  { name: '면접 항목', items: [
    { id:'interview_regular', label:'면접정규', abbr:'정규' },
    { id:'interview_short', label:'단기', abbr:'단기' },
  ]},
];
const SUBJECT_BY_ID = {};
SUBJECT_CATEGORIES.forEach(cat=> cat.items.forEach(it=> SUBJECT_BY_ID[it.id]=it));

const SPEECH_SUBJECT_IDS = SUBJECT_CATEGORIES[0].items.map(it=>it.id);
const INTERVIEW_SUBJECT_IDS = SUBJECT_CATEGORIES[1].items.map(it=>it.id);
function studentHasSpeech(student){
  return !!(student && student.subjects && student.subjects.some(id=>SPEECH_SUBJECT_IDS.includes(id)));
}
function studentHasInterview(student){
  return !!(student && student.subjects && student.subjects.some(id=>INTERVIEW_SUBJECT_IDS.includes(id)));
}

function subjectAbbr(student){
  if(!student || !student.subjects || student.subjects.length===0) return '';
  return student.subjects.map(id=> SUBJECT_BY_ID[id] ? SUBJECT_BY_ID[id].abbr : '').join('');
}
function subjectLabelsFull(student){
  if(!student || !student.subjects || student.subjects.length===0) return '-';
  return student.subjects.map(id=> SUBJECT_BY_ID[id] ? SUBJECT_BY_ID[id].label : null).filter(Boolean).join(', ');
}
function subjectCheckboxesHtml(selectedIds, classNameForInputs){
  const selected = selectedIds || [];
  return SUBJECT_CATEGORIES.map(cat=>`
    <div style="margin-bottom:6px">
      <div class="muted" style="font-weight:700; margin-bottom:4px">${cat.name}</div>

function teacherName(id){
  const t = data.teachers.find(x=>x.id===id);
  return t ? t.name : '(미배정)';
}
function studentName(id){
  const s = data.students.find(x=>x.id===id);
  return s ? s.name : '(삭제된 학생)';
}
function weekdayOf(dateStr){
  const p = parseYMD(dateStr);
  return new Date(Date.UTC(p.y, p.m-1, p.d)).getUTCDay();
}
function studentScheduleSummary(studentId){
  const sessions = data.sessions.filter(s=>s.studentId===studentId);
  if(sessions.length===0) return '-';
  const dayNames = ['일','월','화','수','목','금','토'];
  const uniqueTimes = new Set(sessions.map(s=>s.time));
  const uniqueWeekdays = new Set(sessions.map(s=>weekdayOf(s.date)));
  if(uniqueTimes.size===1 && uniqueWeekdays.size===1){
    const wd = [...uniqueWeekdays][0];
    const t = [...uniqueTimes][0];
    return `매주 ${dayNames[wd]} ${t}`;
  }
  const sorted = sessions.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const parts = sorted.map(s=>`${fmtDateShort(s.date)} ${s.time}`);
  if(parts.length > 4){
    return parts.slice(0,4).join(', ') + ` 외 ${parts.length-4}건`;
  }
  return parts.join(', ');
}

// ---- conflict check ----
function findConflict(teacherId, date, time, excludeSessionId){
  return data.sessions.find(s =>
    s.id !== excludeSessionId &&
    s.teacherId === teacherId &&
    s.date === date &&
    s.time === time &&
    s.status !== 'delayed_moved' // moved-away sessions don't block
  );
}

// Unified availability check: returns null if the slot is free, otherwise
// { type: 'session', session } or { type: 'block', block } describing why it's taken.
// Every place that schedules or moves a session should go through this, so
// teacher breaks/unavailable times are blocked exactly like double-booking is.
function checkAvailability(teacherId, date, time, excludeSessionId){
  const sessionConflict = findConflict(teacherId, date, time, excludeSessionId);
  if(sessionConflict) return { type:'session', session: sessionConflict };
  const blockHit = blocksForTeacherOnDate(teacherId, date).find(b=>
    b.startTime === b.endTime ? time === b.startTime : (time >= b.startTime && time < b.endTime)
  );
  if(blockHit) return { type:'block', block: blockHit };
  return null;
}
function availabilityMessage(conflict, teacherId, date, time){
  if(conflict.type==='session'){
    return `같은 시간에 타 학생이 있습니다. (${teacherName(teacherId)} 강사 · ${fmtDate(date)} ${time} · ${studentName(conflict.session.studentId)} 학생)`;
  }
  const b = conflict.block;
  const timeLabel = b.startTime===b.endTime ? b.startTime : `${b.startTime}~${b.endTime}`;
  return `이 시간은 ${teacherName(teacherId)} 강사의 쉬는시간/불가시간입니다. (${fmtDate(date)} ${timeLabel}${b.label ? ' · '+b.label : ''})`;
}

// Recomputes a student's round numbers (1/N, 2/N ...) based on chronological
// date+time order. Call this any time a student's sessions change date/time,
// or a session is added/removed, so "n/N" always matches the actual schedule order.
function renumberStudentRounds(studentId){
  const student = data.students.find(s=>s.id===studentId);
  const totalRounds = student ? student.totalSessions : null;
  const sessions = data.sessions
    .filter(s=>s.studentId===studentId)
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));
  sessions.forEach((s, idx)=>{
    s.round = idx+1;
    if(totalRounds) s.totalRounds = totalRounds;
  });
}

// Lazily upgrades an older-format block (single weekday/date/time) to the current
// shape (weekdays array, startDate/endDate, startTime/endTime). Safe to call repeatedly.
function normalizeBlock(b){
  if(!b.weekdays){
    b.weekdays = (typeof b.weekday === 'number') ? [b.weekday] : [];
  }
  if(!b.startTime){
    b.startTime = b.time || '00:00';
    b.endTime = b.time || '00:00';
  }
  if(b.mode === 'once'){
    b.mode = 'range';
    b.startDate = b.date;
    b.endDate = b.date;
  }
  return b;
}

// Returns this teacher's break/unavailable blocks that fall on the given date
// (either a weekly-recurring block matching that weekday, or a date-range block covering that date).
function blocksForTeacherOnDate(teacherId, dateStr){
  const dow = weekdayOf(dateStr);
  return data.blocks.filter(b=>{
    normalizeBlock(b);
    if(b.teacherId !== teacherId) return false;
    if(b.mode === 'weekly') return b.weekdays.includes(dow);
    if(b.mode === 'range') return dateStr >= b.startDate && dateStr <= b.endDate;
    return false;
  }).sort((a,b)=>a.startTime.localeCompare(b.startTime));
}

// Expands blocks into individual dates within a given month, for a given teacher
// filter ('all' or a specific teacherId). Used by the Schedule list view so
// breaks show up there too, not just the calendar.
function expandBlocksForMonth(monthStr, teacherFilterId){
  const [y, m] = monthStr.split('-').map(Number);
  const total = daysInMonth(y, m);
  const monthStartStr = `${monthStr}-01`;
  const monthEndStr = `${monthStr}-${String(total).padStart(2,'0')}`;
  const results = [];
  data.blocks.forEach(b=>{
    normalizeBlock(b);
    if(teacherFilterId !== 'all' && b.teacherId !== teacherFilterId) return;
    if(b.mode === 'range'){
      const rangeStart = b.startDate < monthStartStr ? monthStartStr : b.startDate;
      const rangeEnd = b.endDate > monthEndStr ? monthEndStr : b.endDate;
      if(rangeStart > rangeEnd) return; // no overlap with this month
      let cursor = rangeStart;
      while(cursor <= rangeEnd){
        results.push({ date: cursor, block: b });
        cursor = addDays(cursor, 1);
      }
    } else if(b.mode === 'weekly'){
      for(let day=1; day<=total; day++){
        const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        if(b.weekdays.includes(weekdayOf(dateStr))){
          results.push({ date: dateStr, block: b });
        }
      }
    }
  });
  return results;
}

// Returns the PIN required to switch into this role, or null if no lock is set.
function requiredPinFor(target){
  if(target === 'admin') return data.adminPin || null;
  const teacher = data.teachers.find(t=>t.id===target);
  return (teacher && teacher.pin) ? teacher.pin : null;
}

function attemptRoleSwitch(target, onSuccess, onCancel){
  if(target === currentRole){ return; } // no-op
  const neededPin = requiredPinFor(target);
  if(!neededPin){
    currentRole = target;
    render();
    if(onSuccess) onSuccess();
    return;
  }
  const targetLabel = target === 'admin' ? '관리자' : teacherName(target) + ' 강사';
  openPinModal(targetLabel, neededPin, ()=>{
    currentRole = target;
    render();
    if(onSuccess) onSuccess();
  }, onCancel);
}

function openPinModal(targetLabel, correctPin, onSuccess, onCancel){
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <h4>${targetLabel} 잠금 해제</h4>
    <div class="muted">비밀번호(PIN)를 입력해주세요.</div>
    <div class="field" style="margin-top:10px"><input type="password" id="pinInput" inputmode="numeric" placeholder="PIN 입력" autofocus></div>
    <div id="pinWarn" class="warning-box"></div>
    <div class="row" style="justify-content:flex-end; margin-top:10px">
      <button class="btn secondary" id="pinCancel">취소</button>
      <button class="btn" id="pinOk">확인</button>
    </div>
  `;
  backdrop.classList.add('show');
  const input = document.getElementById('pinInput');
  input.focus();
  const cleanup = (didSucceed)=>{
    backdrop.classList.remove('show');
    if(!didSucceed && onCancel) onCancel();
  };
  document.getElementById('pinCancel').onclick = ()=> cleanup(false);
  const tryConfirm = ()=>{
    const val = input.value.trim();
    if(val === correctPin){
      cleanup(true);
      onSuccess();
    } else {
      const warn = document.getElementById('pinWarn');
      warn.textContent = 'PIN이 일치하지 않아요.';
      warn.style.display = 'block';
      input.value = '';
      input.focus();
    }
  };
  document.getElementById('pinOk').onclick = tryConfirm;
  input.onkeydown = (e)=>{ if(e.key === 'Enter') tryConfirm(); };
}

function visibleSessions(){
  if(currentRole==='admin') return data.sessions;
  return data.sessions.filter(s=>s.teacherId===currentRole);
}
function visibleStudents(){
  if(currentRole==='admin') return data.students;
  // A teacher should see a student if they're the default teacher OR they teach
  // at least one of that student's sessions (multi-teacher students).
  const idsFromSessions = new Set(data.sessions.filter(s=>s.teacherId===currentRole).map(s=>s.studentId));
  return data.students.filter(s=> s.teacherId===currentRole || idsFromSessions.has(s.id));
}

// Sessions flagged as needing payment (new registration's 1회차, or a session added
// via "회차 추가") that haven't been marked paid yet, due today or already overdue.
// Respects the current role — a teacher only sees alerts for their own students.
function getPaymentAlerts(){
  const today = todayStr();
  const visibleIds = new Set(visibleSessions().map(s=>s.id));
  return data.sessions
    .filter(s=> s.paymentFlag && !s.paid && visibleIds.has(s.id) && s.date <= today)
    .sort((a,b)=> a.date.localeCompare(b.date))
    .map(s=> ({ session: s, studentName: studentName(s.studentId), dueDate: s.date }));
}

function paymentAlertBannerHtml(){
  const alerts = getPaymentAlerts();
  if(alerts.length===0) return '';
  const today = todayStr();
  return `
    <div class="pay-banner">
      <span class="pay-banner-icon">⭐</span>
      <span class="pay-banner-title">결제 필요</span>
      <span class="pay-banner-list">${alerts.map(a=>
        `${a.studentName}${a.dueDate < today ? ' (지남!)' : ''}`
      ).join(', ')}</span>

  `;
}

function updateScheduleResults(){
  const container = document.getElementById('scheduleResults');
  if(!container) return;
  const query = scheduleSearchQuery.trim().toLowerCase();

  const sessions = visibleSessions()
    .filter(s => s.status !== 'delayed_moved')
    .filter(s => scheduleTeacherFilter === 'all' || s.teacherId === scheduleTeacherFilter)
    .filter(s => s.date.slice(0,7) === scheduleMonthFilter)
    .filter(s => !query || studentName(s.studentId).toLowerCase().includes(query));

  const blockEntries = query ? [] : expandBlocksForMonth(scheduleMonthFilter, scheduleTeacherFilter);

  const byDate = {};
  sessions.forEach(s=>{
    byDate[s.date] = byDate[s.date] || [];
    byDate[s.date].push({ type:'session', time:s.time, s });
  });
  blockEntries.forEach(({date, block})=>{
    byDate[date] = byDate[date] || [];
    byDate[date].push({ type:'block', time:block.startTime, block });
  });
  const dates = Object.keys(byDate).sort();

  let html = '';
  if(dates.length===0){
    html += query
      ? `<div class="empty">"${scheduleSearchQuery}" 학생의 수업을 이 달에서 찾을 수 없어요.</div>`

    dates.forEach(d=>{
      html += `<div class="day-group"><div class="day-title">${fmtDate(d)}</div><table><thead><tr>
        <th>시간</th><th>학생</th><th>과목</th><th>회차</th><th>담당강사</th><th>상태</th><th>처리</th>
      </tr></thead><tbody>`;
      byDate[d].sort((a,b)=>a.time.localeCompare(b.time)).forEach(item=>{
        html += item.type==='block' ? renderBlockRow(item.block, d) : renderSessionRow(item.s);
      });
      html += `</tbody></table></div>`;
    });
  }
  container.innerHTML = html;
  container.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick = ()=> handleSessionAction(btn.dataset.action, btn.dataset.id);
  });

    btn.onclick = ()=>{
      openConfirmModal('이 쉬는시간을 삭제할까요?', ()=>{
        data.blocks = data.blocks.filter(b=>b.id!==btn.dataset.delBlockRow);
        saveData(); render(); toast('삭제했어요.');
      });
    };
  });
  container.querySelectorAll('.sched-student-link').forEach(el=>{
    el.onclick = ()=> openStudentDetailModal(el.dataset.studentId);
  });
}

      const dayNum = parseInt(dateStr.slice(8,10),10);
      const isToday = dateStr === todayStr();
      const list = byDate[dateStr] || [];
      const blocks = blocksForTeacherOnDate(timetableTeacherId, dateStr);
      const dow = weekdayOf(dateStr);
      const holiday = holidayLabel(dateStr);
      const dayLabelClass = holiday ? 'holiday' : (dow===0 ? 'sunday' : '');
      const combined = [
        ...list.map(s=>({ type:'session', time:s.time, s })),
        ...blocks.map(b=>({ type:'block', time:b.startTime, b })),
      ].sort((a,b)=>a.time.localeCompare(b.time));
      html += `<div class="cal-cell ${isToday?'today':''}">
        <div class="cal-daynum ${dayLabelClass}" ${holiday?`title="${holiday}"`:''}>${dayNum} (${dayNames[dow]})${holiday?` <span class="holiday-tag">${holiday}</span>`:''}</div>
        ${combined.map(item=>{
          if(item.type==='block'){
            const b = item.b;
            const timeLabel = b.startTime===b.endTime ? b.startTime : `${b.startTime}~${b.endTime}`;
            return `<div class="tt-cell blocked" data-block-id="${b.id}">${timeLabel} ${b.label||'쉬는시간'}</div>`;
          }
          const s = item.s;
          const cls = s.status==='completed' ? 'completed' : (s.status==='noshow' ? 'noshow' : '');
          const student = data.students.find(x=>x.id===s.studentId);
          const abbr = subjectAbbr(student);
          const isDue = s.paymentFlag && !s.paid;
          const dueCls = isDue ? ' pay-due' : '';
          const duePrefix = isDue ? '⭐결제! ' : '';
          const noticePending = s.rescheduleNoticeNeeded && !s.rescheduleNoticeDone;
          const noticeCls = noticePending ? ' notice-pending' : '';
          return `<div class="tt-cell ${cls}${dueCls}${noticeCls}" data-session-id="${s.id}">${duePrefix}${s.time} ${studentName(s.studentId)}${abbr?' '+abbr:''} ${s.round}/${s.totalRounds}</div>`;
        }).join('')}
      </div>`;
    });
    html += `</div></div>`;
  }

  root.innerHTML = html;
  const teacherSel = document.getElementById('ttTeacherSelect');
  if(teacherSel){ teacherSel.onchange = (e)=>{ timetableTeacherId = e.target.value; render(); }; }
  document.getElementById('prevMonthBtn').onclick = ()=>{ currentMonth = addMonths(currentMonth,-1); render(); };
  document.getElementById('thisMonthBtn').onclick = ()=>{ currentMonth = todayStr().slice(0,7); render(); };
  document.getElementById('nextMonthBtn').onclick = ()=>{ currentMonth = addMonths(currentMonth,1); render(); };
  root.querySelectorAll('.tt-cell[data-session-id]').forEach(cell=>{
    cell.onclick = ()=> openSessionQuickView(cell.dataset.sessionId);
  });
}

// Read-only summary of a student's filled-in detail fields, filtered to whichever
// group (스피치/면접) matches their registered subjects — used inside the timetable's
// session quick-view popup so staff don't have to click through to a separate screen.
function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function studentDetailSummaryHtml(student){
  if(!student){
    return `<div class="muted">학생 정보를 찾을 수 없어요.</div>`;
  }
  const detail = student.detail || {};
  const hasSpeech = studentHasSpeech(student);
  const hasInterview = studentHasInterview(student);
  const noSubjectYet = !hasSpeech && !hasInterview;

  if(noSubjectYet){
    return `<div class="warning-box" style="display:block">과목이 아직 선택되지 않았어요. '학생 관리 → 수정'에서 스피치/면접 과목을 선택하면 그에 맞는 내용이 여기 나와요.</div>`;
  }

  const groupsToShow = STUDENT_DETAIL_GROUPS.filter(g=>{
    if(g.name === '스피치 관련') return hasSpeech;
    if(g.name === '면접 관련') return hasInterview;
    return true; // 공통 그룹은 항상 표시
  });

  const rows = [];
  groupsToShow.forEach(g=>{
    g.fields.forEach(f=>{
      const val = (detail[f.key]||'').trim();
      if(val){
        rows.push(`<div style="margin-bottom:8px"><div class="muted" style="font-weight:700">✅ ${f.label}</div><div style="white-space:pre-wrap">${escapeHtml(val)}</div></div>`);
      }
    });
  });

  if(rows.length===0){
    return `<div class="muted">아직 입력된 상세정보가 없어요. 학생 이름을 눌러 입력해보세요.</div>`;
  }
  return rows.join('');
}

function actionButtonsHTML(s){
  let actions = '';
  if(s.status === 'scheduled'){
    actions += `<button class="btn small secondary" data-action="edit" data-id="${s.id}">시간변경</button>`;
    actions += `<button class="btn small danger" data-action="noshow" data-id="${s.id}">당취</button>`;
  }
  if(s.status === 'completed' || s.status === 'noshow'){
    actions += `<button class="btn small secondary" data-action="edit" data-id="${s.id}">시간변경</button>`;
    actions += `<button class="btn small secondary" data-action="revert" data-id="${s.id}">되돌리기</button>`;
  }
  if(s.paymentFlag && !s.paid){
    actions += `<button class="btn small warn" data-action="markpaid" data-id="${s.id}">⭐ 결제완료</button>`;
  }
  if(s.paymentFlag && s.paid){
    actions += `<button class="btn small secondary" data-action="unmarkpaid" data-id="${s.id}">결제완료 취소</button>`;
  }
  if(s.round === 1){
    actions += `<button class="btn small ${s.paymentFlag ? 'secondary' : 'warn'}" data-action="togglepaymentflag" data-id="${s.id}">${s.paymentFlag ? '⭐ 결제안내 끄기' : '⭐ 결제안내 켜기'}</button>`;
  }
  if(s.rescheduleNoticeNeeded && !s.rescheduleNoticeDone){
    actions += `<button class="btn small warn" data-action="noticedone" data-id="${s.id}">보강안내완료</button>`;
  }
  if(s.rescheduleNoticeNeeded && s.rescheduleNoticeDone){
    actions += `<button class="btn small secondary" data-action="noticeundo" data-id="${s.id}">보강안내 취소</button>`;
  }
  actions += `<button class="btn small danger" data-action="delete" data-id="${s.id}">삭제</button>`;
  return actions;
}

function handleSessionAction(action, id){
  const session = data.sessions.find(s=>s.id===id);
  if(!session) return;

  if(action==='delete'){
    openConfirmModal('이 수업을 삭제할까요? 부족해진 회차만큼 마지막 수업 다음 주로 보강 일정이 자동으로 채워져요.', ()=>{
      const studentId = session.studentId;
      const templateTeacherId = session.teacherId;
      const templateTime = session.time;
      data.sessions = data.sessions.filter(s=>s.id!==id);

      // The denominator (total registered sessions) never changes just because one
      // class got cancelled — the student is still owed that class. So instead of
      // just leaving a hole, we automatically add however many makeup sessions are
      // needed to get back up to the registered total, each one week after the
      // previous latest scheduled date (skipping forward again if that exact slot
      // is already taken by someone else).
      const student = data.students.find(s=>s.id===studentId);
      const addedDates = [];
      if(student){
        const remaining = data.sessions.filter(s=>s.studentId===studentId);
        const shortfall = student.totalSessions - remaining.length;
        if(shortfall > 0){
          // Base off the latest date among remaining sessions *and* the just-deleted
          // session itself. Without including the deleted session's own date here,
          // deleting the LAST round would compute the "latest remaining date" as the
          // second-to-last round, and +7 days from that lands exactly back on the
          // slot we just vacated — silently recreating the same class instead of
          // pushing a makeup one week further out.
          let lastDate = remaining.length
            ? [...remaining.map(s=>s.date), session.date].sort().slice(-1)[0]
            : addDays(session.date, -7);
          for(let i=0;i<shortfall;i++){
            let candidate = addDays(lastDate, 7);
            let guard = 0;
            while(checkAvailability(templateTeacherId, candidate, templateTime, null) && guard < 26){
              candidate = addDays(candidate, 7);
              guard++;
            }
            data.sessions.push({
              id: uid(), studentId, teacherId: templateTeacherId, date: candidate, time: templateTime,
              round: 0, totalRounds: student.totalSessions, status: 'scheduled', paid: false
            });
            addedDates.push(candidate);
            lastDate = candidate;
          }
        }
      }
      renumberStudentRounds(studentId);
      saveData(); render();
      toast(addedDates.length
        ? `삭제했어요. 보강 일정을 ${addedDates.map(d=>fmtDate(d)).join(', ')}에 자동으로 추가했어요.`
        : '삭제했어요. 남은 수업들의 회차 번호를 날짜순으로 다시 정리했어요.');
    });
    return;
  }
  if(action==='markpaid'){
    session.paid = true; saveData(); render(); toast(`${studentName(session.studentId)} 학생 ${session.round}회차 결제완료로 표시했어요.`);
    return;
  }
  if(action==='unmarkpaid'){
    session.paid = false; saveData(); render(); toast(`${studentName(session.studentId)} 학생 ${session.round}회차 결제완료를 취소했어요.`);
    return;
  }
  if(action==='togglepaymentflag'){
    session.paymentFlag = !session.paymentFlag;
    if(!session.paymentFlag) session.paid = false;
    saveData(); render();
    toast(session.paymentFlag ? `${studentName(session.studentId)} 학생 1회차에 결제 안내를 켰어요.` : `${studentName(session.studentId)} 학생 1회차 결제 안내를 껐어요.`);
    return;
  }
  if(action==='noticedone'){
    session.rescheduleNoticeDone = true; saveData(); render(); toast(`${studentName(session.studentId)} 학생에게 보강 안내 완료로 표시했어요.`);
    return;
  }
  if(action==='noticeundo'){
    session.rescheduleNoticeDone = false; saveData(); render(); toast('보강 안내 완료를 취소했어요.');
    return;
  }
  if(action==='noshow'){
    session.status='noshow'; saveData(); render(); toast('당취로 표시했어요.');
    return;
  }
  if(action==='revert'){
    session.status='scheduled'; saveData(); render(); toast('예정 상태로 되돌렸어요.');
    return;
  }
  if(action==='edit'){
    openEditModal(session);
    return;
  }
}

function openEditModal(session){

      <button class="btn secondary" id="mCancel">취소</button>

    </div>
  `;
  backdrop.classList.add('show');
  document.getElementById('mCancel').onclick = ()=> backdrop.classList.remove('show');
  document.getElementById('mSave').onclick = ()=>{

    const newTime = document.getElementById('editTime').value;
    const conflict = checkAvailability(session.teacherId, newDate, newTime, session.id);
    const warn = document.getElementById('editWarn');
    if(conflict){
      const msg = availabilityMessage(conflict, session.teacherId, newDate, newTime);
      warn.textContent = msg;
      warn.style.display='block';
      alert(msg);
      return;
    }
    const confirmMsg = `
      <b>${studentName(session.studentId)}</b> 학생의 수업을<br><br>
      변경 전: <b>${teacherName(session.teacherId)} 강사 · ${fmtDate(session.date)} ${session.time}</b><br>
      변경 후: <b>${teacherName(session.teacherId)} 강사 · ${fmtDate(newDate)} ${newTime}</b><br><br>

    `;
    openConfirmActionModal(confirmMsg, '변경 확정', ()=>{
      session.date = newDate; session.time = newTime;
      // A date/time change means the student needs to be told about the new slot —
      // flag it so it shows in blue until staff confirms they've informed the student.
      session.rescheduleNoticeNeeded = true;
      session.rescheduleNoticeDone = false;
      renumberStudentRounds(session.studentId);
      saveData();
      backdrop.classList.remove('show');
      render();
      toast('수업 시간이 변경됐어요. 회차 번호도 날짜순으로 자동 정리됐어요.');
    });
  };
}

      <div class="muted">매주 반복 예: 4회 등록, 6/1 시작, 매주 월요일 → 6/1, 6/8, 6/15, 6/22에 1/4 ~ 4/4 회차가 자동으로 잡혀요. 시간표가 제각각인 학생은 '회차마다 직접 입력'을, 정해진 요일에 강사만 바뀌는 경우(B강사 3회 후 C강사 4회 등)는 '강사 여러 명(구간별)'을 선택하세요. 모든 경우에 같은 강사·같은 시간에 겹치면 자동으로 등록을 막아드려요.</div>
    </div>
  `;

  let html = registrationPanelHtml + `
    <div class="panel">
      <div class="row" style="justify-content:space-between; align-items:center; flex-wrap:wrap">
        <h3 style="margin:0">학생 목록 ${currentRole!=='admin' ? '· ' + teacherName(currentRole) + ' 강사만 보기' : ''}</h3>
        <div class="field" style="margin:0">
          <input id="studentSearch" placeholder="학생 이름으로 찾기" value="${studentSearchQuery.replace(/"/g,'&quot;')}" style="min-width:200px; border:1px solid var(--line); border-radius:8px; padding:8px 10px;">
        </div>
      </div>
      <div id="studentListResults"></div>
    </div>
  `;
  root.innerHTML = html;
  const studentSearchInput = document.getElementById('studentSearch');
  if(studentSearchInput){
    studentSearchInput.oninput = (e)=>{ studentSearchQuery = e.target.value; updateStudentListResults(); };
  }
  updateStudentListResults();

  if(currentRole === 'admin'){
    document.getElementById('regBtn').onclick = onRegisterStudent;
    document.getElementById('regMode').onchange = (e)=>{
      const mode = e.target.value;
      document.getElementById('weeklyFields').style.display = mode==='weekly' ? 'flex' : 'none';
      document.getElementById('weeklyHint').style.display = mode==='weekly' ? 'block' : 'none';
      document.getElementById('segmentFields').style.display = mode==='segments' ? 'block' : 'none';
      document.getElementById('manualFields').style.display = mode==='manual' ? 'block' : 'none';
      if(mode==='segments' && document.getElementById('segmentRows').children.length===0){
        addSegmentRow(); addSegmentRow();
      }
    };
    document.getElementById('addSegmentBtn').onclick = ()=> addSegmentRow();
    document.getElementById('regBtnSegments').onclick = onRegisterStudentSegments;
    document.getElementById('genRoundsBtn').onclick = ()=>{
      const total = parseInt(document.getElementById('regTotal').value,10) || 1;
      const defaultTeacherId = document.getElementById('regTeacher').value;
      const container = document.getElementById('manualRounds');
      let rowsHtml = '';
      for(let i=1;i<=total;i++){
        rowsHtml += `<div class="row" style="align-items:flex-end">
          <div class="field" style="min-width:60px"><label>${i}회차</label></div>
          <div class="field"><label>강사</label><select class="manualTeacher" data-round="${i}">${teacherOptions(defaultTeacherId)}</select></div>
          <div class="field"><label>날짜</label><input type="date" class="manualDate" data-round="${i}" value="${todayStr()}"></div>
          <div class="field"><label>시간</label><input type="time" class="manualTime" data-round="${i}" value="15:00"></div>
        </div>`;
      }
      container.innerHTML = rowsHtml;
    };
    document.getElementById('regBtnManual').onclick = onRegisterStudentManual;
  }
}

function updateStudentListResults(){
  const container = document.getElementById('studentListResults');
  if(!container) return;
  const students = visibleStudents();
  const query = studentSearchQuery.trim().toLowerCase();
  const filteredStudents = students.filter(s=> !query || s.name.toLowerCase().includes(query));

  let html = '';
  if(students.length===0){
    html = `<div class="empty">등록된 학생이 없어요.</div>`;
  } else if(filteredStudents.length===0){
    html = `<div class="empty">"${studentSearchQuery}" 학생을 찾을 수 없어요.</div>`;
  } else {
    const isAdmin = currentRole === 'admin';
    html = `<table><thead><tr>
      <th>이름</th><th>담당강사</th><th>과목</th><th>진행률</th><th>등록한 수업시간</th>${isAdmin ? '<th>관리</th>' : ''}
    </tr></thead><tbody>`;
    filteredStudents.forEach(s=>{
      // A class counts as "done" once its date has passed (no-shows don't count as done),
      // since there's no manual "완료" button anymore — the calendar date itself is the signal.
      const today = todayStr();
      const done = data.sessions.filter(x=>x.studentId===s.id && x.status!=='noshow' && x.date < today).length;
      const pct = Math.min(100, Math.round((done/s.totalSessions)*100));
      const hasDetail = s.detail && Object.values(s.detail).some(v=>v && v.trim());
      const genderTag = s.gender==='male' ? ' (남)' : s.gender==='female' ? ' (여)' : '';
      html += `<tr>
        <td><button class="btn small secondary" data-view-student="${s.id}" style="font-weight:700">${s.name}${genderTag}${hasDetail?' 📝':''}</button></td>
        <td>${teacherName(s.teacherId)}</td>
        <td>${subjectLabelsFull(s)}</td>
        <td><div class="progress-wrap"><div class="progress-bar"><div style="width:${pct}%"></div></div><span class="muted">${done}/${s.totalSessions}</span></div></td>
        <td>${studentScheduleSummary(s.id)}</td>
        ${isAdmin ? `<td class="actions-cell">
          <button class="btn small secondary" data-edit-student="${s.id}">수정</button>
          <button class="btn small danger" data-del-student="${s.id}">삭제</button>
        </td>` : ''}
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  container.innerHTML = html;
  container.querySelectorAll('[data-view-student]').forEach(btn=>{
    btn.onclick = ()=> openStudentDetailModal(btn.dataset.viewStudent);
  });
  container.querySelectorAll('[data-edit-student]').forEach(btn=>{
    btn.onclick = ()=> openStudentEditModal(btn.dataset.editStudent);
  });
  container.querySelectorAll('[data-del-student]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.delStudent;
      openConfirmModal('이 학생과 관련된 모든 스케줄도 함께 삭제돼요. 계속할까요?', ()=>{
        data.students = data.students.filter(s=>s.id!==id);
        data.sessions = data.sessions.filter(s=>s.studentId!==id);
        saveData(); render(); toast('학생을 삭제했어요.');
      });
    };
  });
}

  },
];
// flat list, used for reading/writing all keys regardless of group
const STUDENT_DETAIL_FIELDS = STUDENT_DETAIL_GROUPS.flatMap(g=>g.fields);

function renderDetailFieldHtml(f, detail){
  return `
    <div class="field">
      <label>${f.label}</label>
      ${f.type==='textarea'
        ? `<textarea id="detail_${f.key}" rows="2" style="border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-family:inherit; font-size:13px; resize:vertical;">${detail[f.key]||''}</textarea>`
        : `<input type="${f.type}" id="detail_${f.key}" placeholder="${f.placeholder||''}" value="${detail[f.key]||''}">`
      }
    </div>
  `;
}

function openStudentDetailModal(studentId){
  const student = data.students.find(s=>s.id===studentId);
  if(!student) return;
  const detail = student.detail || {};
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');

  const hasSpeech = studentHasSpeech(student);
  const hasInterview = studentHasInterview(student);
  const noSubjectYet = !hasSpeech && !hasInterview;
  let selectedGender = student.gender || 'unknown';

  // Show only the group(s) matching this student's selected subjects.
  // If nothing selected yet, show both so nothing is hidden by mistake, plus a hint.
  const groupsToShow = STUDENT_DETAIL_GROUPS.filter(g=>{
    if(g.name === '스피치 관련') return hasSpeech || noSubjectYet;
    if(g.name === '면접 관련') return hasInterview || noSubjectYet;
    return true; // 공통 그룹은 항상 표시
  });

  const genderOptions = [
    { value:'male', label:'남' },
    { value:'female', label:'여' },
    { value:'unknown', label:'성별모름' },
  ];

  body.innerHTML = `
    <h4>${student.name} · 상세정보</h4>
    <div class="muted">${teacherName(student.teacherId)} 강사 · 총 ${student.totalSessions}회 · 과목: ${subjectLabelsFull(student)}</div>
    <div class="row" style="gap:6px; margin-top:8px" id="genderChips">
      ${genderOptions.map(g=>`<button type="button" class="btn small ${selectedGender===g.value?'':'secondary'}" data-gender="${g.value}">${g.label}</button>`).join('')}
    </div>
    ${noSubjectYet ? `<div class="warning-box" style="display:block; margin-top:8px">과목이 아직 선택되지 않았어요. '학생 관리 → 수정'에서 스피치/면접 과목을 선택하면 그에 맞는 항목만 여기 나와요.</div>` : ''}
    <div class="divider"></div>
    ${groupsToShow.map(g=>`
      <div style="margin-bottom:10px">
        <div class="muted" style="font-weight:700; margin-bottom:4px">${g.name}</div>
        ${g.fields.map(f=>renderDetailFieldHtml(f, detail)).join('')}
      </div>
    `).join('')}
    <div class="row" style="justify-content:flex-end; margin-top:10px">
      <button class="btn secondary" id="mCancel">닫기</button>
      <button class="btn" id="mSave">저장</button>
    </div>
  `;
  backdrop.classList.add('show');
  document.getElementById('mCancel').onclick = ()=> backdrop.classList.remove('show');
  document.querySelectorAll('#genderChips [data-gender]').forEach(btn=>{
    btn.onclick = ()=>{
      selectedGender = btn.dataset.gender;
      document.querySelectorAll('#genderChips [data-gender]').forEach(b=>{
        b.classList.toggle('secondary', b.dataset.gender !== selectedGender);
      });
    };
  });
  document.getElementById('mSave').onclick = ()=>{
    const newDetail = { ...detail };
    groupsToShow.forEach(g=>{
      g.fields.forEach(f=>{
        newDetail[f.key] = document.getElementById(`detail_${f.key}`).value.trim();
      });
    });
    student.detail = newDetail;
    student.gender = selectedGender;
    saveData();
    backdrop.classList.remove('show');
    render();
    toast('학생 상세정보를 저장했어요.');
  };
}

function openStudentEditModal(studentId){
  const student = data.students.find(s=>s.id===studentId);
  if(!student) return;
  const backdrop = document.getElementById('modalBackdrop');
  const body = document.getElementById('modalBody');
  const statusLabel = {scheduled:'예정', completed:'완료', noshow:'당취'};
  const sessions = data.sessions
    .filter(s=>s.studentId===studentId)
    .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time));

  const sessionRowsHtml = sessions.length===0
    ? `<div class="muted">아직 등록된 수업이 없어요.</div>`
    : sessions.map(s=>`
        <div class="row" style="align-items:flex-end">
          <div class="field" style="min-width:60px"><label>${s.round}회차</label><span class="badge ${s.status==='completed'?'completed':s.status==='noshow'?'noshow':'scheduled'}">${statusLabel[s.status]||s.status}</span></div>
          <div class="field"><label>강사</label><select class="editSessTeacher" data-session-id="${s.id}">${teacherOptions(s.teacherId)}</select></div>
          <div class="field"><label>날짜</label><input type="date" class="editSessDate" data-session-id="${s.id}" value="${s.date}"></div>
          <div class="field"><label>시간</label><input type="time" class="editSessTime" data-session-id="${s.id}" value="${s.time}"></div>
        </div>
      `).join('');

  // IMPORTANT: "아직 지나지 않은 수업"은 status가 아니라 날짜로 판단해야 해요.
  // 이 앱은 지난 수업이라고 status를 자동으로 'completed'로 바꾸지 않고, 화면에 보여줄 때만
  // 날짜 비교로 "완료"처럼 취급하기 때문에, 지난 수업도 데이터상 status는 여전히 'scheduled'인 경우가 많아요.
  // 그래서 status==='scheduled'로 거르면 이미 지난 수업까지 같이 잡혀버려요 — 반드시 날짜(>= 오늘)로 걸러야 해요.
  const today0 = todayStr();
  const scheduledCount = sessions.filter(s=>s.date >= today0).length;

  body.innerHTML = `
    <h4>학생 정보 수정</h4>
    <div class="field"><label>이름</label><input id="editStuName" value="${student.name}"></div>
    <div class="field"><label>기본 담당 강사</label><select id="editStuTeacher">${teacherOptions(student.teacherId)}</select></div>
    <div class="field"><label>총 등록 횟수</label><input id="editStuTotal" type="number" min="1" value="${student.totalSessions}"></div>
    <div class="field grow" style="margin-bottom:4px">
      <label>과목</label>
      ${subjectCheckboxesHtml(student.subjects || [], 'editStuSubjectChk')}
    </div>
    <div class="muted">'기본 담당 강사'는 학생 목록에 표시되는 대표 강사예요. 회차마다 실제 담당 강사는 아래에서 각각 다르게 지정할 수 있어요 (여러 강사 배정 가능).</div>
    <div class="divider"></div>
    <h4 style="margin-bottom:4px">등록한 수업시간</h4>
    <div class="muted" style="margin-bottom:8px">회차별로 강사·날짜·시간을 각각 고칠 수 있어요. 저장하면 회차 번호도 날짜순으로 자동 정리돼요.</div>
    <div id="editSessionRows">${sessionRowsHtml}</div>
    <div class="divider"></div>
    <div class="muted" style="font-weight:700; margin-bottom:6px">환불 / 잔여 수업 전체 취소</div>
    <div class="muted" style="margin-bottom:8px">오늘 날짜를 기준으로, 아직 지나지 않은(오늘 포함 이후) 수업을 한 번에 모두 취소해요 (환불 등으로 남은 수업을 더 이상 듣지 않을 때). 이미 지난 수업은 상태(예정/완료/당취)와 상관없이 그대로 남고, 총 등록 횟수도 실제 진행된 횟수로 자동 조정돼요. 현재 취소 대상: <b>${scheduledCount}개</b></div>
    <button class="btn danger" id="cancelRemainingBtn" type="button" ${scheduledCount===0?'disabled':''}>잔여 수업 전체 취소</button>
    <div class="divider"></div>
    <div class="muted" style="font-weight:700; margin-bottom:6px">회차 추가 (연장/보강 등)</div>
    <div class="row">
      <div class="field">
        <label>추가 방식</label>
        <select id="addRoundMode">
          <option value="weekly">매주 반복 추가 (같은 요일로 여러 회차)</option>
          <option value="single">특정 날짜만 추가 (1회성, 요일 상관없이)</option>
        </select>
      </div>
    </div>
    <div class="row" id="addRoundWeeklyFields" style="align-items:flex-end">
      <div class="field"><label>강사</label><select id="addRoundTeacherW">${teacherOptions(student.teacherId)}</select></div>
      <div class="field"><label>시작일</label><input type="date" id="addRoundStartW" value="${todayStr()}"></div>
      <div class="field"><label>시간</label><input type="time" id="addRoundTimeW" value="15:00"></div>
      <div class="field"><label>회차 수</label><input type="number" id="addRoundCountW" min="1" value="4" style="width:70px"></div>
      <div class="field">
        <label style="display:flex; align-items:center; gap:4px; font-weight:500; cursor:pointer;">
          <input type="checkbox" id="addRoundPayFlagW" checked> 결제 필요 표시
        </label>
      </div>
      <div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn secondary" id="addRoundWeeklyBtn" type="button">추가</button></div>
    </div>
    <div id="addRoundSingleWrap" style="display:none">
      <div class="row" style="align-items:flex-end">
        <div class="field"><label>강사</label><select id="addRoundTeacher">${teacherOptions(student.teacherId)}</select></div>
        <div class="field"><label>몇 회 추가?</label><input type="number" id="addRoundCountS" min="1" value="1" style="width:70px"></div>
        <div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn secondary" id="genAddRoundRowsBtn" type="button">입력칸 만들기</button></div>
      </div>
      <div id="addRoundSingleRows" style="margin:10px 0"></div>
      <div class="row" id="addRoundSingleSubmitRow" style="align-items:flex-end; display:none">
        <div class="field">
          <label style="display:flex; align-items:center; gap:4px; font-weight:500; cursor:pointer;">
            <input type="checkbox" id="addRoundPayFlag"> 결제 필요 표시 (맨 처음 회차에만 붙어요)
          </label>
        </div>
        <div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn secondary" id="addRoundBtn" type="button">추가</button></div>
      </div>
    </div>
    <div class="muted">매주 반복은 기본으로 "결제 필요"에 체크돼있고(연장은 보통 결제가 필요하니까요), 특정 날짜 추가(보강 성격)는 기본으로 체크가 꺼져있어요. 필요에 따라 체크박스로 바꿔주세요. 특정 날짜 추가는 여러 회를 각각 다른 날짜로 한 번에 넣을 수 있어요 — "몇 회 추가?"에 숫자를 넣고 "입력칸 만들기"를 누르면 그만큼 입력칸이 생겨요.</div>
    <div id="editStuWarn" class="warning-box"></div>
    <div class="row" style="justify-content:flex-end; margin-top:10px">
      <button class="btn secondary" id="mCancel">닫기</button>
      <button class="btn" id="mSave">저장</button>
    </div>
  `;
  backdrop.classList.add('show');
  document.getElementById('mCancel').onclick = ()=> backdrop.classList.remove('show');

  const cancelRemainingBtn = document.getElementById('cancelRemainingBtn');
  if(cancelRemainingBtn){
    cancelRemainingBtn.onclick = ()=>{
      // Date-based, not status-based: past sessions (date < today) are history and must
      // never be touched here, even if their status field still happens to say 'scheduled'.
      const today0 = todayStr();
      const remaining = data.sessions.filter(s=>s.studentId===studentId && s.date >= today0);
      if(remaining.length===0){ toast('취소할, 아직 지나지 않은 수업이 없어요.'); return; }
      const keptCount = data.sessions.filter(s=>s.studentId===studentId).length - remaining.length;
      const datesPreview = remaining.slice().sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(s=>`${fmtDate(s.date)} ${s.time}`).join(', ');
      openConfirmModal(`아직 지나지 않은 수업 <b>${remaining.length}개</b>(${datesPreview})를 모두 취소할까요? 이미 지난 수업은 그대로 남고, 총 등록 횟수는 <b>${keptCount}회</b>로 조정돼요. 이 작업은 되돌릴 수 없어요.`, ()=>{
        data.sessions = data.sessions.filter(s=> !(s.studentId===studentId && s.date >= today0));
        const newTotal = data.sessions.filter(s=>s.studentId===studentId).length;
        student.totalSessions = newTotal;
        data.sessions.forEach(s=>{ if(s.studentId===studentId) s.totalRounds = newTotal; });
        renumberStudentRounds(studentId);
        saveData();
        backdrop.classList.remove('show');
        render();
        toast(`잔여 수업을 모두 취소했어요. 총 등록 횟수를 ${newTotal}회로 조정했어요.`);
      });
    };
  }

  const addRoundModeSel = document.getElementById('addRoundMode');
  if(addRoundModeSel){
    addRoundModeSel.onchange = (e)=>{
      const weekly = e.target.value === 'weekly';
      document.getElementById('addRoundWeeklyFields').style.display = weekly ? 'flex' : 'none';
      document.getElementById('addRoundSingleWrap').style.display = weekly ? 'none' : 'block';
    };
  }

  document.getElementById('genAddRoundRowsBtn').onclick = ()=>{
    const count = parseInt(document.getElementById('addRoundCountS').value,10) || 1;
    const container = document.getElementById('addRoundSingleRows');
    let rowsHtml = '';
    for(let i=1;i<=count;i++){
      rowsHtml += `<div class="row" style="align-items:flex-end">
        <div class="field" style="min-width:60px"><label>${i}번째</label></div>
        <div class="field"><label>날짜</label><input type="date" class="addRoundRowDate" data-idx="${i}" value="${todayStr()}"></div>
        <div class="field"><label>시간</label><input type="time" class="addRoundRowTime" data-idx="${i}" value="15:00"></div>
      </div>`;
    }
    container.innerHTML = rowsHtml;
    document.getElementById('addRoundSingleSubmitRow').style.display = 'flex';
  };

  document.getElementById('addRoundBtn').onclick = ()=>{
    const newTeacherId = document.getElementById('addRoundTeacher').value;
    const wantsPaymentFlag = document.getElementById('addRoundPayFlag').checked;
    const warn = document.getElementById('editStuWarn');
    warn.style.display = 'none';

    const dateInputs = Array.from(document.querySelectorAll('.addRoundRowDate'));
    const timeInputs = Array.from(document.querySelectorAll('.addRoundRowTime'));
    if(dateInputs.length === 0){
      warn.textContent = '먼저 "입력칸 만들기"를 눌러 날짜·시간을 입력해주세요.';
      warn.style.display = 'block';
      return;
    }
    if(!newTeacherId){
      warn.textContent = '강사를 선택해주세요.';
      warn.style.display = 'block';
      return;
    }
    const rows = dateInputs.map((input, i)=>({ date: input.value, time: timeInputs[i].value }));
    for(const r of rows){
      if(!r.date || !r.time){
        warn.textContent = '모든 회차의 날짜·시간을 입력해주세요.';
        warn.style.display = 'block';
        return;
      }
    }

    const conflicts = [];
    rows.forEach((r, idx)=>{
      const avail = checkAvailability(newTeacherId, r.date, r.time, null)
        || (rows.find((other,j)=> j!==idx && other.date===r.date && other.time===r.time) ? { type:'session', session:{ studentId:null } } : null);
      if(avail) conflicts.push(`${idx+1}번째: ${availabilityMessage(avail, newTeacherId, r.date, r.time)}`);
    });
    if(conflicts.length>0){
      const msg = `추가되지 않았어요. ${conflicts.join(' / ')}`;
      warn.textContent = msg;
      warn.style.display = 'block';
      alert(msg);
      return;
    }

    const newSessions = rows.map((r, idx)=>({
      id: uid(), studentId: student.id, teacherId: newTeacherId, date: r.date, time: r.time,
      round: 0, totalRounds: student.totalSessions, status: 'scheduled',
      paymentFlag: wantsPaymentFlag && idx===0, paid: false
    }));
    data.sessions.push(...newSessions);
    student.totalSessions = data.sessions.filter(s=>s.studentId===student.id).length;
    renumberStudentRounds(student.id);
    saveData();
    toast(`${rows.length}회차를 추가했어요.`);
    openStudentEditModal(studentId); // reopen to show the refreshed list
  };

  document.getElementById('addRoundWeeklyBtn').onclick = ()=>{
    const newTeacherId = document.getElementById('addRoundTeacherW').value;
    const startDate = document.getElementById('addRoundStartW').value;
    const newTime = document.getElementById('addRoundTimeW').value;
    const count = parseInt(document.getElementById('addRoundCountW').value,10) || 1;
    const wantsPaymentFlag = document.getElementById('addRoundPayFlagW').checked;
    const warn = document.getElementById('editStuWarn');
    warn.style.display = 'none';
    if(!newTeacherId || !startDate || !newTime){
      warn.textContent = '강사·시작일·시간을 모두 입력해주세요.';
      warn.style.display = 'block';
      return;
    }
    const plannedDates = [];
    for(let i=0;i<count;i++){ plannedDates.push(addDays(startDate, i*7)); }
    const conflicts = [];
    plannedDates.forEach((d, idx)=>{
      const avail = checkAvailability(newTeacherId, d, newTime, null);
      if(avail) conflicts.push(`${idx+1}회차: ${availabilityMessage(avail, newTeacherId, d, newTime)}`);
    });
    if(conflicts.length>0){
      const msg = `추가되지 않았어요. ${conflicts.join(' / ')}`;
      warn.textContent = msg;
      warn.style.display = 'block';
      alert(msg);
      return;
    }
    const newSessions = plannedDates.map((d, idx)=>({
      id: uid(), studentId: student.id, teacherId: newTeacherId, date: d, time: newTime,
      round: 0, totalRounds: student.totalSessions, status: 'scheduled',
      paymentFlag: wantsPaymentFlag && idx===0, paid: false
    }));
    data.sessions.push(...newSessions);
    student.totalSessions = data.sessions.filter(s=>s.studentId===student.id).length;
    renumberStudentRounds(student.id);
    saveData();
    toast(`${count}회차를 매주 반복으로 추가했어요.`);
    openStudentEditModal(studentId);
  };

  document.getElementById('mSave').onclick = ()=>{
    const name = document.getElementById('editStuName').value.trim();
    const defaultTeacherId = document.getElementById('editStuTeacher').value;
    const total = parseInt(document.getElementById('editStuTotal').value,10);
    const warn = document.getElementById('editStuWarn');
    warn.style.display='none';
    if(!name){ warn.textContent='이름을 입력해주세요.'; warn.style.display='block'; return; }
    if(!defaultTeacherId){ warn.textContent='기본 담당 강사를 선택해주세요.'; warn.style.display='block'; return; }
    if(!total || total<1){ warn.textContent='총 등록 횟수를 확인해주세요.'; warn.style.display='block'; return; }

    // gather the (possibly edited) teacher/date/time for each session
    const dateInputs = Array.from(document.querySelectorAll('.editSessDate'));
    const timeInputs = Array.from(document.querySelectorAll('.editSessTime'));
    const teacherInputs = Array.from(document.querySelectorAll('.editSessTeacher'));
    const edits = dateInputs.map(input=>{
      const sessionId = input.dataset.sessionId;
      const timeInput = timeInputs.find(t=>t.dataset.sessionId===sessionId);
      const teacherInput = teacherInputs.find(t=>t.dataset.sessionId===sessionId);
      return {
        sessionId,
        date: input.value,
        time: timeInput ? timeInput.value : '',
        teacherId: teacherInput ? teacherInput.value : defaultTeacherId,
      };
    });

    for(const e of edits){
      if(!e.date || !e.time){
        warn.textContent = '모든 회차의 날짜·시간을 입력해주세요.';
        warn.style.display = 'block';
        return;
      }
    }

    // check conflicts: against other students' sessions or teacher breaks (per each row's own teacher),
    // AND against each other (same student can't double-book itself)
    const conflictMsgs = [];
    for(let i=0;i<edits.length;i++){
      const e = edits[i];
      const avail = checkAvailability(e.teacherId, e.date, e.time, e.sessionId);
      if(avail && (avail.type==='block' || avail.session.studentId !== studentId)){
        conflictMsgs.push(availabilityMessage(avail, e.teacherId, e.date, e.time));
        continue;
      }
      const selfDuplicate = edits.find((other, j)=> j!==i && other.teacherId===e.teacherId && other.date===e.date && other.time===e.time);
      if(selfDuplicate){
        conflictMsgs.push(`${e.date} ${e.time} (이 학생의 다른 회차와 강사·시간이 겹침)`);
      }
    }
    if(conflictMsgs.length>0){
      const msg = `저장되지 않았어요: ${[...new Set(conflictMsgs)].join(' / ')}`;
      warn.textContent = msg;
      warn.style.display = 'block';
      alert(msg);
      return;
    }

    student.name = name;
    student.teacherId = defaultTeacherId;
    student.totalSessions = total;
    student.subjects = Array.from(document.querySelectorAll('.editStuSubjectChk:checked')).map(c=>c.value);
    edits.forEach(e=>{
      const session = data.sessions.find(s=>s.id===e.sessionId);
      if(session){ session.date = e.date; session.time = e.time; session.teacherId = e.teacherId; }
    });
    data.sessions.forEach(s=>{
      if(s.studentId === student.id){
        s.totalRounds = total;
      }
    });
    renumberStudentRounds(student.id);
    saveData();
    backdrop.classList.remove('show');
    render();
    toast('학생 정보를 수정했어요.');
  };
}

function teacherOptions(selectedId){
  if(data.teachers.length===0) return `<option value="">강사를 먼저 등록해주세요</option>`;
  return data.teachers.map(t=>`<option value="${t.id}" ${t.id===selectedId?'selected':''}>${t.name}</option>`).join('');
}

function readCommonRegFields(){
  const name = document.getElementById('regName').value.trim();
  const teacherId = document.getElementById('regTeacher').value;
  const total = parseInt(document.getElementById('regTotal').value,10);
  const subjects = Array.from(document.querySelectorAll('.regSubjectChk:checked')).map(c=>c.value);
  return { name, teacherId, total, subjects };
}

function validateCommonRegFields(f, warnBox){
  warnBox.style.display='none';
  if(!f.name){ warnBox.textContent='이름을 입력해주세요.'; warnBox.style.display='block'; return false; }
  if(!f.teacherId){ warnBox.textContent='담당 강사를 선택해주세요.'; warnBox.style.display='block'; return false; }
  if(!f.total || f.total<1){ warnBox.textContent='총 등록 횟수를 확인해주세요.'; warnBox.style.display='block'; return false; }
  return true;
}

function subjectLabelsForIds(ids){
  if(!ids || ids.length===0) return '(미선택)';
  return ids.map(id=> SUBJECT_BY_ID[id] ? SUBJECT_BY_ID[id].label : null).filter(Boolean).join(', ');
}

function onRegisterStudent(){
  const f = readCommonRegFields();
  const start = document.getElementById('regStart').value;
  const time = document.getElementById('regTime').value;
  const warnBox = document.getElementById('regWarning');
  if(!validateCommonRegFields(f, warnBox)) return;

  const { name, teacherId, total, subjects } = f;
  const firstDate = start; // weekly recurrence follows the start date's own weekday

  // compute the exact intended dates first (round 1..total, every 7 days) —
  // no silent skip-forward to another date. If any of them conflicts, block entirely.
  const intendedDates = [];
  for(let i=0;i<total;i++){ intendedDates.push(addDays(firstDate, i*7)); }

  const conflicts = [];
  intendedDates.forEach((d, idx)=>{
    const avail = checkAvailability(teacherId, d, time, null);
    if(avail){
      conflicts.push(`${idx+1}회차: ${availabilityMessage(avail, teacherId, d, time)}`);
    }
  });

  if(conflicts.length>0){
    const msg = `등록되지 않았어요. ${conflicts.join(' / ')} 시작일/시간을 바꾸거나, '회차마다 직접 입력'으로 등록해주세요.`;
    warnBox.textContent = msg;
    warnBox.style.display = 'block';
    alert(msg);
    return;
  }

  const confirmMsg = `
    <b>${name}</b> 학생을 아래 내용으로 등록합니다.<br><br>
    과목: <b>${subjectLabelsForIds(subjects)}</b><br>
    담당 강사: <b>${teacherName(teacherId)}</b><br>
    시작일/시간: <b>${fmtDate(firstDate)} ${time}</b> (매주 반복)<br>
    총 등록 횟수: <b>${total}회</b> (${fmtDate(intendedDates[0])} ~ ${fmtDate(intendedDates[intendedDates.length-1])})<br><br>
    위 내용이 맞으신가요?
  `;
  openConfirmActionModal(confirmMsg, '등록 확정', ()=>{
    const student = { id: uid(), name, teacherId, totalSessions: total, subjects };
    const newSessions = intendedDates.map((d, idx)=>({
      id: uid(), studentId: student.id, teacherId, date: d, time,
      round: idx+1, totalRounds: total, status: 'scheduled',
      paymentFlag: idx===0, paid: false
    }));

    data.students.push(student);
    data.sessions.push(...newSessions);
    saveData();
    render();
    toast(`${name} 학생 등록 완료! 회차 ${total}개가 자동으로 생성됐어요.`);
  });
}

function onRegisterStudentSegments(){
  const f = readCommonRegFields();
  const warnBox = document.getElementById('regWarning');
  if(!validateCommonRegFields(f, warnBox)) return;

  const segRows = Array.from(document.querySelectorAll('#segmentRows > .row'));
  if(segRows.length===0){
    warnBox.textContent = '구간을 1개 이상 추가해주세요.';
    warnBox.style.display = 'block';
    return;
  }
  const segments = segRows.map(row=>({
    teacherId: row.querySelector('.segTeacher').value,
    start: row.querySelector('.segStart').value,
    time: row.querySelector('.segTime').value,
    count: parseInt(row.querySelector('.segCount').value,10) || 0,
  }));
  const segmentTotal = segments.reduce((sum,s)=>sum+s.count, 0);
  if(segmentTotal !== f.total){
    warnBox.textContent = `구간별 회차 수 합계(${segmentTotal})가 총 등록 횟수(${f.total})와 달라요. 맞춰주세요.`;
    warnBox.style.display = 'block';
    return;
  }
  if(segments.some(s=>!s.teacherId || !s.start || !s.time || s.count<1)){
    warnBox.textContent = '모든 구간에 강사·시작일·시간·1 이상의 회차 수를 입력해주세요.';
    warnBox.style.display = 'block';
    return;
  }

  // Each segment runs its own weekly cadence from its own start date/time.
  // Round numbers are assigned in segment order first, then re-sorted chronologically
  // at the end (via renumberStudentRounds) so "n/N" always matches actual date order.
  const plannedSessions = []; // { teacherId, date, time }
  segments.forEach(seg=>{
    for(let i=0;i<seg.count;i++){
      plannedSessions.push({ teacherId: seg.teacherId, date: addDays(seg.start, i*7), time: seg.time });
    }
  });

  const conflicts = [];
  plannedSessions.forEach((p, idx)=>{
    const avail = checkAvailability(p.teacherId, p.date, p.time, null)
      || (plannedSessions.find((other,j)=> j!==idx && other.teacherId===p.teacherId && other.date===p.date && other.time===p.time)
          ? { type:'session', session:{ studentId: null } } : null);
    if(avail){
      conflicts.push(`${idx+1}번째 입력 (${teacherName(p.teacherId)} 강사, ${fmtDate(p.date)} ${p.time}): ${availabilityMessage(avail, p.teacherId, p.date, p.time)}`);
    }
  });
  if(conflicts.length>0){
    const msg = `등록되지 않았어요. ${conflicts.join(' / ')}`;
    warnBox.textContent = msg;
    warnBox.style.display = 'block';
    alert(msg);
    return;
  }

  const total = f.total;
  const student = { id: uid(), name: f.name, teacherId: plannedSessions[0].teacherId, totalSessions: total, subjects: f.subjects };
  const newSessions = plannedSessions.map((p, idx)=>({
    id: uid(), studentId: student.id, teacherId: p.teacherId, date: p.date, time: p.time,
    round: idx+1, totalRounds: total, status: 'scheduled', paid: false
  }));

  data.students.push(student);
  data.sessions.push(...newSessions);
  renumberStudentRounds(student.id);
  const firstSession = data.sessions.find(s=>s.studentId===student.id && s.round===1);
  if(firstSession) firstSession.paymentFlag = true;
  saveData();
  render();
  toast(`${f.name} 학생 등록 완료! 구간별로 담당 강사가 다르게 배정됐어요.`);
}

function onRegisterStudentManual(){
  const f = readCommonRegFields();
  const warnBox = document.getElementById('regWarning');
  if(!validateCommonRegFields(f, warnBox)) return;

  const { name, teacherId, total, subjects } = f;
  const dateInputs = Array.from(document.querySelectorAll('.manualDate'));
  const timeInputs = Array.from(document.querySelectorAll('.manualTime'));
  const teacherInputs = Array.from(document.querySelectorAll('.manualTeacher'));

  if(dateInputs.length !== total || timeInputs.length !== total){
    warnBox.textContent = `'총 등록 횟수만큼 입력칸 만들기'를 먼저 눌러 ${total}개 회차의 날짜·시간을 입력해주세요.`;
    warnBox.style.display = 'block';
    return;
  }

  const student = { id: uid(), name, teacherId, totalSessions: total, subjects };

  const newSessions = [];
  const conflicts = [];
  for(let i=0;i<total;i++){
    const round = parseInt(dateInputs[i].dataset.round,10);
    const date = dateInputs[i].value;
    const time = timeInputs[i].value;
    const roundTeacherId = teacherInputs[i] ? teacherInputs[i].value : teacherId;
    if(!date || !time){
      warnBox.textContent = `${round}회차의 날짜·시간을 모두 입력해주세요.`;
      warnBox.style.display = 'block';
      return;
    }
    const avail = checkAvailability(roundTeacherId, date, time, null)
      || (newSessions.find(s=>s.teacherId===roundTeacherId && s.date===date && s.time===time)
          ? { type:'session', session: newSessions.find(s=>s.teacherId===roundTeacherId && s.date===date && s.time===time) }
          : null);
    if(avail){
      conflicts.push(`${round}회차: ${availabilityMessage(avail, roundTeacherId, date, time)}`);
    } else {
      newSessions.push({ id: uid(), studentId: student.id, teacherId: roundTeacherId, date, time, round, totalRounds: total, status: 'scheduled', paymentFlag: round===1, paid: false });
    }
  }

  if(conflicts.length>0){
    const msg = `등록되지 않았어요. ${conflicts.join(' / ')} 날짜/시간을 수정한 후 다시 시도해주세요.`;
    warnBox.textContent = msg;
    warnBox.style.display = 'block';
    alert(msg);
    return;
  }

  data.students.push(student);
  data.sessions.push(...newSessions);
  saveData();
  render();
  toast(`${name} 학생 등록 완료! 입력하신 ${total}개 회차가 각각의 날짜로 생성됐어요.`);
}

      <div class="row">
        <div class="field"><label>현재 상태</label><div style="padding-top:8px">${data.adminPin ? '<span class="badge completed">설정됨 🔒</span>' : '<span class="muted">미설정</span>'}</div></div>
        <div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn secondary" id="setAdminPinBtn">${data.adminPin ? '관리자 PIN 변경' : '관리자 PIN 설정'}</button></div>
        ${data.adminPin ? `<div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn secondary" id="clearAdminPinBtn">관리자 PIN 해제</button></div>` : ''}
      </div>
    </div>`;

  html += `
    <div class="panel">
      <h3>쉬는시간 / 불가시간 등록</h3>
      <div class="muted" style="margin-bottom:8px">여기서 등록한 시간은 시간표와 스케줄에 파란색으로 표시돼요. 학생 수업(검정색)과 구분돼서 한눈에 보여요.</div>
      <div class="row">
        <div class="field"><label>강사</label><select id="blockTeacher">${teacherOptions()}</select></div>
        <div class="field">
          <label>반복 방식</label>
          <select id="blockMode">
            <option value="weekly">매주 반복 (요일 선택, 여러 개 가능)</option>
            <option value="range">특정 기간 (날짜 범위, 하루도 가능)</option>
          </select>
        </div>
      </div>
      <div class="row" id="blockWeekdayField">
        <div class="field grow">
          <label>요일 (여러 개 선택 가능)</label>
          <div class="row" style="flex-wrap:wrap; gap:4px 10px; align-items:center">
            ${['일','월','화','수','목','금','토'].map((dn,i)=>`
              <label style="display:flex; align-items:center; gap:4px; font-size:12px; font-weight:500; cursor:pointer;">
                <input type="checkbox" class="blockWeekdayChk" value="${i}" ${i>=1&&i<=5?'checked':''}> ${dn}
              </label>
            `).join('')}
            <button class="btn small secondary" id="blockAllDaysBtn" type="button">매일 선택</button>
            <button class="btn small secondary" id="blockWeekdaysBtn" type="button">평일만</button>
          </div>
        </div>
      </div>
      <div class="row" id="blockDateField" style="display:none">
        <div class="field"><label>시작일</label><input type="date" id="blockStartDate" value="${todayStr()}"></div>
        <div class="field"><label>며칠간</label><input type="number" id="blockDays" min="1" value="1" style="width:70px"></div>
        <div class="field"><label>종료일 (자동계산, 직접수정 가능)</label><input type="date" id="blockEndDate" value="${todayStr()}"></div>
      </div>
      <div class="row">
        <div class="field"><label>시작시간</label><input type="time" id="blockStartTime" value="12:00"></div>
        <div class="field"><label>종료시간</label><input type="time" id="blockEndTime" value="13:00"></div>
        <div class="field grow"><label>이름 (선택)</label><input id="blockLabel" placeholder="예: 점심시간, 개인사정"></div>
        <div class="field" style="justify-content:flex-end"><label>&nbsp;</label><button class="btn" id="addBlockBtn">등록</button></div>
      </div>
      <div class="muted">예: 하한나 강사가 7/20부터 3일간 매일 13~16시 불가 → 반복방식 '특정 기간', 시작일 7/20, 며칠간 3, 시작시간 13:00, 종료시간 16:00 → 한 번에 등록돼요.</div>
    </div>
    <div class="panel">
      <h3>등록된 쉬는시간 / 불가시간</h3>
  `;
  if(data.blocks.length===0){
    html += `<div class="empty">등록된 쉬는시간이 없어요.</div>`;
  } else {
    html += `<table><thead><tr><th>강사</th><th>반복</th><th>시간</th><th>이름</th><th>관리</th></tr></thead><tbody>`;
    const dayNames = ['일','월','화','수','목','금','토'];
    data.blocks.forEach(b=>{
      normalizeBlock(b);
      const repeatLabel = b.mode==='weekly'
        ? `매주 ${b.weekdays.slice().sort().map(d=>dayNames[d]).join('·')}요일`
        : (b.startDate===b.endDate ? `${fmtDate(b.startDate)} (하루)` : `${fmtDate(b.startDate)} ~ ${fmtDate(b.endDate)}`);
      const timeLabel = b.startTime===b.endTime ? b.startTime : `${b.startTime}~${b.endTime}`;
      html += `<tr>
        <td>${teacherName(b.teacherId)}</td>
        <td>${repeatLabel}</td>
        <td>${timeLabel}</td>
        <td>${b.label || '-'}</td>
        <td><button class="btn small danger" data-del-block="${b.id}">삭제</button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;
  root.innerHTML = html;
  document.getElementById('addTeacherBtn').onclick = ()=>{
    const val = document.getElementById('teacherName').value.trim();
    if(!val) return;
    data.teachers.push({ id: uid(), name: val });
    saveData(); render(); toast('강사를 추가했어요.');
  };
  root.querySelectorAll('[data-del-teacher]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.delTeacher;
      const cnt = data.students.filter(s=>s.teacherId===id).length;
      if(cnt>0){ toast('담당 학생이 있는 강사는 삭제할 수 없어요.'); return; }
      data.teachers = data.teachers.filter(t=>t.id!==id);
      if(currentRole===id) currentRole='admin';
      saveData(); render(); toast('강사를 삭제했어요.');
    };
  });
  root.querySelectorAll('[data-copy-link]').forEach(btn=>{
    btn.onclick = async ()=>{
      const teacherId = btn.dataset.copyLink;
      const url = `${location.origin}${location.pathname}?teacher=${teacherId}`;
      try{
        await navigator.clipboard.writeText(url);
        toast('링크를 복사했어요. 강사님께 그대로 보내주세요.');
      }catch(e){
        prompt('아래 링크를 복사해서 강사님께 보내주세요:', url);
      }
    };
  });
  root.querySelectorAll('[data-set-pin]').forEach(btn=>{
    btn.onclick = ()=>{
      const teacher = data.teachers.find(t=>t.id===btn.dataset.setPin);
      openSetPinModal(`${teacher.name} 강사 PIN`, (newPin)=>{
        teacher.pin = newPin;
        saveData(); render(); toast('PIN을 설정했어요.');
      });
    };
  });
  root.querySelectorAll('[data-clear-pin]').forEach(btn=>{
    btn.onclick = ()=>{
      const teacher = data.teachers.find(t=>t.id===btn.dataset.clearPin);
      openConfirmModal(`${teacher.name} 강사의 PIN 잠금을 해제할까요?`, ()=>{
        delete teacher.pin;
        saveData(); render(); toast('PIN을 해제했어요.');
      });
    };
  });
  const setAdminPinBtn = document.getElementById('setAdminPinBtn');
  if(setAdminPinBtn){
    setAdminPinBtn.onclick = ()=>{
      openSetPinModal('관리자 PIN', (newPin)=>{
        data.adminPin = newPin;
        saveData(); render(); toast('관리자 PIN을 설정했어요.');
      });
    };
  }
  const clearAdminPinBtn = document.getElementById('clearAdminPinBtn');
  if(clearAdminPinBtn){
    clearAdminPinBtn.onclick = ()=>{
      openConfirmModal('관리자 PIN 잠금을 해제할까요?', ()=>{
        delete data.adminPin;
        saveData(); render(); toast('관리자 PIN을 해제했어요.');
      });
    };
  }

  const blockModeSel = document.getElementById('blockMode');
  if(blockModeSel){
    blockModeSel.onchange = (e)=>{
      const isRange = e.target.value === 'range';
      document.getElementById('blockWeekdayField').style.display = isRange ? 'none' : 'flex';
      document.getElementById('blockDateField').style.display = isRange ? 'flex' : 'none';
    };
  }
  const blockAllDaysBtn = document.getElementById('blockAllDaysBtn');
  if(blockAllDaysBtn){
    blockAllDaysBtn.onclick = ()=>{
      document.querySelectorAll('.blockWeekdayChk').forEach(chk=> chk.checked = true);
    };
  }
  const blockWeekdaysBtn = document.getElementById('blockWeekdaysBtn');
  if(blockWeekdaysBtn){
    blockWeekdaysBtn.onclick = ()=>{
      document.querySelectorAll('.blockWeekdayChk').forEach(chk=>{
        chk.checked = ['1','2','3','4','5'].includes(chk.value);
      });
    };
  }
  const blockStartDateInput = document.getElementById('blockStartDate');
  const blockDaysInput = document.getElementById('blockDays');
  const blockEndDateInput = document.getElementById('blockEndDate');
  const syncEndDateFromDays = ()=>{
    const start = blockStartDateInput.value;
    const days = parseInt(blockDaysInput.value,10) || 1;
    if(start) blockEndDateInput.value = addDays(start, days-1);
  };
  if(blockStartDateInput){
    blockStartDateInput.onchange = syncEndDateFromDays;
    blockDaysInput.onchange = syncEndDateFromDays;
  }
  const addBlockBtn = document.getElementById('addBlockBtn');
  if(addBlockBtn){
    addBlockBtn.onclick = ()=>{
      const teacherId = document.getElementById('blockTeacher').value;
      const mode = document.getElementById('blockMode').value;
      const startTime = document.getElementById('blockStartTime').value;
      const endTime = document.getElementById('blockEndTime').value;
      const label = document.getElementById('blockLabel').value.trim();
      if(!teacherId){ toast('강사를 선택해주세요.'); return; }
      if(!startTime || !endTime){ toast('시작·종료 시간을 입력해주세요.'); return; }
      if(endTime <= startTime){ toast('종료시간은 시작시간보다 늦어야 해요.'); return; }
      const block = { id: uid(), teacherId, mode, startTime, endTime, label };
      if(mode==='weekly'){
        const weekdays = Array.from(document.querySelectorAll('.blockWeekdayChk:checked')).map(c=>parseInt(c.value,10));
        if(weekdays.length===0){ toast('요일을 1개 이상 선택해주세요.'); return; }
        block.weekdays = weekdays;
      } else {
        const startDate = document.getElementById('blockStartDate').value;
        const endDate = document.getElementById('blockEndDate').value;
        if(!startDate || !endDate){ toast('시작일·종료일을 입력해주세요.'); return; }
        if(endDate < startDate){ toast('종료일은 시작일보다 빠를 수 없어요.'); return; }
        block.startDate = startDate;
        block.endDate = endDate;
      }
      data.blocks.push(block);
      saveData(); render(); toast('쉬는시간을 등록했어요.');
    };
  }
  root.querySelectorAll('[data-del-block]').forEach(btn=>{
    btn.onclick = ()=>{
      data.blocks = data.blocks.filter(b=>b.id!==btn.dataset.delBlock);
      saveData(); render(); toast('삭제했어요.');
    };
  });
}

loadData();
</script>
</body>
</html>
